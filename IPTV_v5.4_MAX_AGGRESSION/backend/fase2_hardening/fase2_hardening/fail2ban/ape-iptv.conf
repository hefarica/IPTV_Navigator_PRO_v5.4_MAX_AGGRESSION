# ═══════════════════════════════════════════════════════════════════════════════
# APE OMEGA v7.0 — FASE 2 — CAPA 2.1
# Fail2Ban Jail Configuration: ape-iptv.conf
# Ruta de instalación: /etc/fail2ban/jail.d/ape-iptv.conf
# ═══════════════════════════════════════════════════════════════════════════════
#
# DESCRIPCIÓN:
#   Define 4 jails de protección activa para el ecosistema APE IPTV.
#   Cada jail monitorea un vector de ataque diferente y aplica un ban
#   proporcional a la severidad del ataque.
#
# IMPORTANTE:
#   - Reemplazar APE_ADMIN_IP con la IP real de administración del VPS
#   - Reemplazar APE_VPS_IP con la IP pública del propio VPS
#   - Reiniciar fail2ban después de instalar: systemctl restart fail2ban
#
# ═══════════════════════════════════════════════════════════════════════════════

[DEFAULT]
# IPs que NUNCA serán baneadas (propias + administración)
# IMPORTANTE: Reemplazar con IPs reales antes de desplegar
ignoreip = 127.0.0.1/8 ::1 APE_ADMIN_IP APE_VPS_IP

# Backend de detección (auto = systemd si disponible, sino polling)
backend = auto

# Protocolo de ban (iptables-multiport es el más eficiente)
banaction = iptables-multiport
banaction_allports = iptables-allports

# ── JAIL 1: Errores 4xx masivos (scraping / enumeración de canales) ────────────
[ape-nginx-4xx]
enabled  = true
filter   = ape-nginx-4xx
logpath  = /var/log/nginx/access.log
           /var/log/nginx/ape-access.log
# 10 errores 4xx en 60 segundos = ban 1 hora
maxretry = 10
findtime = 60
bantime  = 3600
port     = http,https
action   = iptables-multiport[name=ape-4xx, port="http,https", protocol=tcp]
           %(action_mwl)s

# ── JAIL 2: Escaneo de rutas no existentes (reconocimiento de infraestructura) ─
[ape-nginx-scan]
enabled  = true
filter   = ape-nginx-scan
logpath  = /var/log/nginx/access.log
           /var/log/nginx/ape-access.log
# 1 sola petición a ruta sospechosa = ban 24 horas inmediato
maxretry = 1
findtime = 3600
bantime  = 86400
port     = http,https
action   = iptables-allports[name=ape-scan, protocol=all]

# ── JAIL 3: Fallos de autenticación JWT ────────────────────────────────────────
[ape-php-auth]
enabled  = true
filter   = ape-php-auth
logpath  = /var/log/nginx/ape-error.log
           /var/log/php8.1-fpm.log
# 5 fallos JWT en 30 segundos = ban 6 horas
maxretry = 5
findtime = 30
bantime  = 21600
port     = http,https
action   = iptables-multiport[name=ape-auth, port="http,https", protocol=tcp]

# ── JAIL 4: Flood al resolver (DoS / abuso del proxy APE) ─────────────────────
[ape-resolve-flood]
enabled  = true
filter   = ape-resolve-flood
logpath  = /var/log/nginx/access.log
           /var/log/nginx/ape-access.log
# 50 peticiones a resolve_quality.php en 10 segundos = ban 30 minutos
maxretry = 50
findtime = 10
bantime  = 1800
port     = http,https
action   = iptables-multiport[name=ape-flood, port="http,https", protocol=tcp]
