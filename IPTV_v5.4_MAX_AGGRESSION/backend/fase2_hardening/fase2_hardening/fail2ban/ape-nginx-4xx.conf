# ═══════════════════════════════════════════════════════════════════════════════
# APE OMEGA v7.0 — Fail2Ban Filter: ape-nginx-4xx.conf
# Ruta de instalación: /etc/fail2ban/filter.d/ape-nginx-4xx.conf
# ═══════════════════════════════════════════════════════════════════════════════
#
# Detecta IPs que generan errores 4xx masivos en los logs de Nginx.
# Formato de log esperado (Nginx combined + custom APE):
#   192.168.1.1 - - [04/Apr/2026:10:00:00 +0000] "GET /resolve_quality.php HTTP/1.1" 403 ...
#
# ═══════════════════════════════════════════════════════════════════════════════

[Definition]

# Prefijo estándar de log Nginx
prefregex = ^<HOST>\s+-\s+\S+\s+\[.*?\]\s+"[^"]*"\s+<_status>\s+

# Capturar cualquier error 4xx (400, 401, 403, 404, 405, 407, 429)
# Excluir 404 en assets estáticos comunes (favicon, robots.txt) para evitar falsos positivos
failregex = ^<HOST>\s+-\s+\S+\s+\[.*?\]\s+"(?:GET|POST|HEAD|OPTIONS)\s+(?!/favicon\.ico|/robots\.txt)\S+\s+HTTP/\d\.\d"\s+(?:400|401|403|405|407|408|429)\s+

# Ignorar peticiones legítimas que pueden generar 4xx ocasionales
ignoreregex = ^<HOST>.*"GET /health HTTP
              ^<HOST>.*"GET /ping HTTP
              ^<HOST>.*"GET /.well-known/
