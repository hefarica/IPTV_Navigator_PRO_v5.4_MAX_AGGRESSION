# ═══════════════════════════════════════════════════════════════════════════════
# APE OMEGA v7.0 — Fail2Ban Filter: ape-nginx-scan.conf
# Ruta de instalación: /etc/fail2ban/filter.d/ape-nginx-scan.conf
# ═══════════════════════════════════════════════════════════════════════════════
#
# Detecta IPs que intentan escanear la infraestructura APE buscando:
#   - Paneles de administración (wp-admin, phpmyadmin, cPanel, etc.)
#   - Rutas de debug/info PHP expuestas
#   - Archivos de configuración (.env, .git, config.php)
#   - Exploits conocidos (shellshock, log4j, etc.)
#
# Ban inmediato (maxretry=1): una sola petición a estas rutas = ban 24h
# ═══════════════════════════════════════════════════════════════════════════════

[Definition]

failregex = ^<HOST>\s+-\s+\S+\s+\[.*?\]\s+"(?:GET|POST|HEAD)\s+(?:
            # Paneles de administración
            /wp-(?:admin|login|config|content|includes)|
            /administrator|/admin(?:istrator)?/|/cpanel|/whm|
            /phpmyadmin|/pma|/myadmin|/mysql|
            # Archivos de configuración expuestos
            /\.env|/\.git|/config\.php|/configuration\.php|
            /wp-config\.php|/settings\.php|/database\.php|
            # PHP info y debug
            /phpinfo|/info\.php|/test\.php|/debug\.php|
            # Exploits conocidos
            /cgi-bin/|/shell|/cmd|/exec|/eval|
            /etc/passwd|/proc/self|
            # Scanners automáticos
            /xmlrpc\.php|/wp-cron\.php|
            # Rutas de backup expuestas
            /backup|/\.bak|/dump\.sql|/db\.sql
            )\S*\s+HTTP/\d\.\d"\s+\d{3}

ignoreregex =
