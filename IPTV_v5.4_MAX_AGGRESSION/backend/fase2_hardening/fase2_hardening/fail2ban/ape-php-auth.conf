# ═══════════════════════════════════════════════════════════════════════════════
# APE OMEGA v7.0 — Fail2Ban Filter: ape-php-auth.conf
# Ruta de instalación: /etc/fail2ban/filter.d/ape-php-auth.conf
# ═══════════════════════════════════════════════════════════════════════════════
#
# Detecta fallos de autenticación JWT en los logs de PHP/Nginx.
# El módulo JWT (ape_jwt_auth.php) escribe en el log de errores Nginx:
#   [APE-JWT-FAIL] ip=192.168.1.1 reason=invalid_signature token=xxx...
#   [APE-JWT-FAIL] ip=192.168.1.1 reason=expired token=xxx...
#   [APE-JWT-FAIL] ip=192.168.1.1 reason=missing_token
#
# ═══════════════════════════════════════════════════════════════════════════════

[Definition]

failregex = \[APE-JWT-FAIL\]\s+ip=<HOST>\s+reason=(?:invalid_signature|expired|missing_token|invalid_claims|quota_exceeded)

ignoreregex =
