# ═══════════════════════════════════════════════════════════════════════════════
# APE OMEGA v7.0 — Fail2Ban Filter: ape-resolve-flood.conf
# Ruta de instalación: /etc/fail2ban/filter.d/ape-resolve-flood.conf
# ═══════════════════════════════════════════════════════════════════════════════
#
# Detecta flood al endpoint resolve_quality.php.
# Uso normal: 1-3 peticiones por zapping. 50+ en 10s = ataque o bot.
#
# ═══════════════════════════════════════════════════════════════════════════════

[Definition]

failregex = ^<HOST>\s+-\s+\S+\s+\[.*?\]\s+"(?:GET|POST)\s+/(?:resolve_quality|resolve_quality_unified|api/resolve)\S*\s+HTTP/\d\.\d"\s+\d{3}

ignoreregex =
