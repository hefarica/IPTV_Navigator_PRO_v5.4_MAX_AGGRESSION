# 🔧 APE NGINX BULLETPROOF CONFIG v2.3.1
# Objective: Ultimate Post-Upload Verification Resilience
# PATCHED: Added PHP-FPM 8.3 endpoints for health, list_files, verify

upstream uploader_node {
    server 127.0.0.1:5002;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name iptv-ape.duckdns.org;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name iptv-ape.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/iptv-ape.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iptv-ape.duckdns.org/privkey.pem;

    # SSL Security Hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    root /var/www/html;

    # ═══════════════════════════════════════════════════════════════
    # PHP-FPM DIRECT ENDPOINTS (Priority over Node.js proxy)
    # These use "= /path" exact match which takes priority over ^~ /api/
    # ═══════════════════════════════════════════════════════════════

    location = /api/upload {
        client_max_body_size 500M;
        client_body_timeout 3600s;
        fastcgi_read_timeout 3600s;
        send_timeout 3600s;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/html/upload.php;
        fastcgi_param SCRIPT_NAME /upload.php;
        # CORS handled by PHP
    }

    location = /api/audit {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/html/audit.php;
        fastcgi_param SCRIPT_NAME /audit.php;
    }

    location = /api/health {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/html/health.php;
        fastcgi_param SCRIPT_NAME /health.php;
        # CORS handled by PHP
    }

    # Fix: frontend sends /api/api/upload/verify (double /api/ path)
    location = /api/api/upload/verify {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/html/verify.php;
        fastcgi_param SCRIPT_NAME /verify.php;
        fastcgi_param QUERY_STRING $query_string;
        # CORS handled by PHP
    }


    location = /api/upload/verify {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/html/verify.php;
        fastcgi_param SCRIPT_NAME /verify.php;
        fastcgi_param QUERY_STRING $query_string;
        # CORS handled by PHP
    }


    # ═══════════════════════════════════════════════════════════════
    # TURBO CHUNKED UPLOAD (upload_chunk.php + finalize_upload.php)
    # ═══════════════════════════════════════════════════════════════
    location = /upload_chunk.php {
        client_max_body_size 60M;
        client_body_timeout 300s;
        fastcgi_read_timeout 300s;
        send_timeout 300s;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/html/upload_chunk.php;
        fastcgi_param SCRIPT_NAME /upload_chunk.php;
        # CORS handled by PHP
    }

    location = /finalize_upload.php {
        client_max_body_size 1M;
        client_body_timeout 600s;
        fastcgi_read_timeout 600s;
        send_timeout 600s;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/html/finalize_upload.php;
        fastcgi_param SCRIPT_NAME /finalize_upload.php;
        # CORS handled by PHP
    }

    location = /delete_file.php {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        include snippets/fastcgi-php.conf;
        # CORS handled by PHP
    }

    location = /list_files.php {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        include snippets/fastcgi-php.conf;
        # CORS handled by PHP
    }


    # === RESOLVER WITH FAILOVER CACHE (Layer 1: Nginx stale-if-error) ===
    location = /resolve.php {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/html/resolve.php;
        fastcgi_param SCRIPT_NAME /resolve.php;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_cache resolver_cache;
        fastcgi_ignore_headers Cache-Control Expires Set-Cookie;
        fastcgi_cache_valid 200 30s;
        fastcgi_cache_use_stale error timeout http_500 http_503;
        fastcgi_cache_lock on;
        fastcgi_cache_lock_timeout 2s;
        fastcgi_cache_background_update on;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header X-Failover-Layer nginx-cache always;
        add_header Access-Control-Allow-Origin * always;
    }

    # 👑 VIP QUALITY OVERLAY (HEVC Variant Picker HW Enforced)
    location = /api/resolve_quality {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/html/resolve_quality.php;
        fastcgi_param SCRIPT_NAME /resolve_quality.php;
        fastcgi_param QUERY_STRING $query_string;
        
        # Limitamos tasa y cache para proteger el engine HW de escaneos
        fastcgi_cache resolver_cache;
        fastcgi_ignore_headers Cache-Control Expires Set-Cookie;
        fastcgi_cache_valid 200 30s;
        fastcgi_cache_use_stale error timeout http_500 http_503;
        
        add_header Access-Control-Allow-Origin * always;
    }

    # Catch-all for any .php file in /var/www/html

    # ═══════════════════════════════════════════════════════════════
    # Universal API Umbrella (Cross-Route CORS Harmony)
    # Routes to Node.js on port 5002 (when running)
    # ═══════════════════════════════════════════════════════════════
    location ^~ /api/ {
        # Bulletproof CORS Gateway
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, HEAD, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Session-Id,X-Chunk-Index,X-Upload-Token,X-File-Name,X-File-Size' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range,X-Verify-Status,X-Session-Id,ETag' always;
        add_header 'Access-Control-Max-Age' 86400 always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, HEAD, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Session-Id,X-Chunk-Index,X-Upload-Token,X-File-Name,X-File-Size' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://uploader_node;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for large uploads (WeTransfer-grade)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        client_max_body_size 2200m;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # Static Lists Access (Verification Fallback)
    # M3U8 Rewriter - Puerto 9999
    location /lists/ {
        alias /var/www/lists/;
        
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range,ETag' always;
        add_header 'Cache-Control' 'no-store, no-cache, must-revalidate' always;
        
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Proxy para streams - pasa por reverse proxy interno
    location ~ ^/p/(.*)$ {
        proxy_pass http://127.0.0.1:8888/p/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        add_header Access-Control-Allow-Origin * always;
    }
    location / {
        try_files $uri $uri/ =404;
    }
}
