# 🚀 NGINX TUNING FOR WE-TRANSFER GRADE UPLOADS
# Path: /etc/nginx/conf.d/upload_tuning.conf

# 1. Global max size (2GB)
client_max_body_size 2048M;

# 2. Disable request buffering
# This allows chunks to be streamed directly to the upstream backend
# without being stored in a temporary Nginx file first.
proxy_request_buffering off;
proxy_http_version 1.1;

# 3. Increase timeouts for large file ingestion
# client_body_timeout: time to read the whole body
# proxy_read_timeout: time to wait for backend processing (reassembly)
client_body_timeout 300s;
send_timeout 300s;
proxy_read_timeout 600s;
proxy_connect_timeout 75s;
proxy_send_timeout 300s;

# 4. Memory management
# client_body_buffer_size: keep small since we use proxy_request_buffering off
client_body_buffer_size 128k;

# 5. Keepalive for parallel chunking performance
keepalive_timeout 65;
keepalive_requests 1000;

# 6. Large headers (for SHA-256 and Session IDs)
large_client_header_buffers 4 16k;
