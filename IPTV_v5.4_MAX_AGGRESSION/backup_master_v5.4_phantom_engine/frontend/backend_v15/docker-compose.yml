  #   networks:
  #     - ape_network

  # ==========================================================================
  # Grafana - Metrics visualization (optional, uncomment to enable)
  # ==========================================================================
  # grafana:
  #   image: grafana/grafana:10.1.0
  #   container_name: ape_v15_grafana
  #   restart: unless-stopped
