  #     - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
  #     - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/ape_v15.json
  #   networks:
  #     - ape_network

  # ============================================================================
  # Volumes - Persistent storage
  # ============================================================================
volumes:
  redis_data:
    driver: local
  # prometheus_data:
  #   driver: local
  # grafana_data:
  #   driver: local

  # ============================================================================
  # Networks - Isolated network for APE services
  # ============================================================================
networks:
  ape_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
