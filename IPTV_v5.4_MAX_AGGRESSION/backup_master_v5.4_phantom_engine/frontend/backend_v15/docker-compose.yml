# ============================================================================
# APE v15 ULTIMATE - Docker Compose Configuration
# ============================================================================
# Production-ready deployment stack with Redis and APE Backend
# Version: 15.0.1-ULTIMATE
# ============================================================================

version: '3.9'

services:
  # ==========================================================================
  # Redis - In-memory cache for telemetry and session management
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: ape_v15_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ape_network

  # ==========================================================================
  # APE v15 Backend - Flask server with HLS proxy and telemetry
  # ==========================================================================
  ape-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ape_v15_backend
    restart: unless-stopped
    ports:
      - "${APE_PORT:-8080}:8080"
    environment:
      - APE_HOST=0.0.0.0
      - APE_PORT=8080
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - APE_LOG_LEVEL=${APE_LOG_LEVEL:-INFO}
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - ape_network
