<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APE v15.0 ULTIMATE - Monitor Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo h1 {
            font-size: 24px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-connected {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status-disconnected {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        @media (max-width: 1200px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.15);
        }

        .stat-card .label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-card .unit {
            font-size: 14px;
            color: #666;
            margin-left: 4px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .panel-title {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }

        .panel-body {
            padding: 20px;
        }

        .sessions-table {
            width: 100%;
            border-collapse: collapse;
        }

        .sessions-table th {
            text-align: left;
            padding: 12px;
            font-size: 12px;
            color: #888;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sessions-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .profile-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .profile-P0 {
            background: rgba(220, 38, 38, 0.2);
            color: #f87171;
        }

        .profile-P1 {
            background: rgba(234, 88, 12, 0.2);
            color: #fb923c;
        }

        .profile-P2 {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .profile-P3 {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .profile-P4 {
            background: rgba(139, 92, 246, 0.2);
            color: #a78bfa;
        }

        .profile-P5 {
            background: rgba(107, 114, 128, 0.2);
            color: #9ca3af;
        }

        .events-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .event-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .event-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .event-failover .event-icon {
            background: rgba(239, 68, 68, 0.2);
        }

        .event-failback .event-icon {
            background: rgba(16, 185, 129, 0.2);
        }

        .event-details {
            flex: 1;
        }

        .event-title {
            font-size: 14px;
            font-weight: 500;
        }

        .event-subtitle {
            font-size: 12px;
            color: #888;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a6fd6;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .refresh-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #888;
        }

        .refresh-indicator.active::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">
                <span style="font-size: 28px;">🚀</span>
                <h1>APE v15.0 ULTIMATE Monitor</h1>
            </div>
            <div style="display: flex; align-items: center; gap: 16px;">
                <div id="status" class="status-badge status-disconnected">
                    <span>●</span>
                    <span id="statusText">Disconnected</span>
                </div>
                <div class="refresh-indicator active" id="refreshIndicator">
                    Auto-refresh: 1s
                </div>
            </div>
        </header>

        <div id="error" class="error-message" style="display: none;"></div>

        <div class="grid">
            <div class="stat-card">
                <div class="label">Active Sessions</div>
                <div class="value" id="activeSessions">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Server Uptime</div>
                <div class="value" id="uptime">0<span class="unit">s</span></div>
            </div>
            <div class="stat-card">
                <div class="label">CPU Usage</div>
                <div class="value" id="cpuUsage">0<span class="unit">%</span></div>
            </div>
            <div class="stat-card">
                <div class="label">RAM Available</div>
                <div class="value" id="ramAvailable">0<span class="unit">MB</span></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">📺 Active Sessions</span>
                <button class="btn btn-outline" onclick="refreshData()">↻ Refresh</button>
            </div>
            <div class="panel-body">
                <table class="sessions-table" id="sessionsTable">
                    <thead>
                        <tr>
                            <th>Channel</th>
                            <th>Profile</th>
                            <th>Content Type</th>
                            <th>Uptime</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="sessionsBody">
                        <tr>
                            <td colspan="5" class="empty-state">No active sessions</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">📊 Recent Events</span>
            </div>
            <div class="panel-body events-list" id="eventsList">
                <div class="empty-state">No recent events</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8085';
        let events = [];

        async function fetchMetrics() {
            try {
                const response = await fetch(`${API_BASE}/api/metrics`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();

                document.getElementById('status').className = 'status-badge status-connected';
                document.getElementById('statusText').textContent = 'Connected';
                document.getElementById('error').style.display = 'none';

                document.getElementById('activeSessions').textContent = data.active_sessions || 0;
                document.getElementById('cpuUsage').innerHTML =
                    `${Math.round(data.system?.cpu_usage_pct || 0)}<span class="unit">%</span>`;
                document.getElementById('ramAvailable').innerHTML =
                    `${Math.round(data.system?.ram_available_mb || 0)}<span class="unit">MB</span>`;

            } catch (error) {
                document.getElementById('status').className = 'status-badge status-disconnected';
                document.getElementById('statusText').textContent = 'Disconnected';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = `Connection error: ${error.message}`;
            }
        }

        async function fetchSessions() {
            try {
                const response = await fetch(`${API_BASE}/api/sessions`);
                if (!response.ok) return;

                const data = await response.json();
                const sessions = data.sessions || [];
                const tbody = document.getElementById('sessionsBody');

                if (sessions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No active sessions</td></tr>';
                    return;
                }

                tbody.innerHTML = sessions.map(s => `
                    <tr>
                        <td>${s.tvg_name || s.channel_id}</td>
                        <td><span class="profile-badge profile-${s.profile}">${s.profile}</span></td>
                        <td>${s.content_type || 'Unknown'}</td>
                        <td>${formatUptime(s.uptime)}</td>
                        <td>
                            <button class="btn btn-outline" onclick="showSessionDetails('${s.session_id}')">
                                Details
                            </button>
                        </td>
                    </tr>
                `).join('');

            } catch (error) {
                console.error('Error fetching sessions:', error);
            }
        }

        function formatUptime(seconds) {
            if (seconds < 60) return `${Math.round(seconds)}s`;
            if (seconds < 3600) return `${Math.floor(seconds / 60)}m ${Math.round(seconds % 60)}s`;
            return `${Math.floor(seconds / 3600)}h ${Math.floor((seconds % 3600) / 60)}m`;
        }

        async function showSessionDetails(sessionId) {
            try {
                const response = await fetch(`${API_BASE}/api/metrics?session_id=${sessionId}`);
                if (!response.ok) return;

                const data = await response.json();
                alert(JSON.stringify(data, null, 2));
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }

        function addEvent(type, title, subtitle) {
            events.unshift({ type, title, subtitle, time: new Date() });
            if (events.length > 100) events.pop();
            renderEvents();
        }

        function renderEvents() {
            const container = document.getElementById('eventsList');

            if (events.length === 0) {
                container.innerHTML = '<div class="empty-state">No recent events</div>';
                return;
            }

            container.innerHTML = events.map(e => `
                <div class="event-item event-${e.type}">
                    <div class="event-icon">
                        ${e.type === 'failover' ? '🔴' : '🟢'}
                    </div>
                    <div class="event-details">
                        <div class="event-title">${e.title}</div>
                        <div class="event-subtitle">${e.subtitle}</div>
                    </div>
                </div>
            `).join('');
        }

        async function refreshData() {
            await Promise.all([fetchMetrics(), fetchSessions()]);
        }

        // Initial load
        refreshData();

        // Auto-refresh every second
        setInterval(refreshData, 1000);
    </script>
</body>

</html>
