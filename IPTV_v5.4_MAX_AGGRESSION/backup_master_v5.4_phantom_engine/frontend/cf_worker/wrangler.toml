name = "ape-redirect-api-m3u8-native"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Worker Limits
workers_dev = true
account_id = "7332c316bc410cc875f384d82df639b9"

# R2 Bucket Binding
[[r2_buckets]]
binding = "CHANNELS_R2"
bucket_name = "apelistv2"
preview_bucket_name = "apelistv2"

# Environment Variables
[vars]
ENVIRONMENT = "production"
VERSION = "2.0.0"

# Custom Domain Routes (Optional - uncomment after setting up custom domain)
# [[routes]]
# pattern = "api.ape-tv.net/*"
# zone_name = "ape-tv.net"

# Cron Triggers (Optional - para recargar cache periódicamente)
# [triggers]
# crons = ["0 */6 * * *"]  # Cada 6 horas
