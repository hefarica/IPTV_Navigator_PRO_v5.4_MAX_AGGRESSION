<svg xmlns="http://www.w3.org/2000/svg" width="90" height="30" viewBox="0 0 90 30">
  <!-- Fondo gris -->
  <defs>
    <linearGradient id="grayGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a5a5a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4a4a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a3a3a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo principal -->
  <rect x="0" y="0" width="90" height="30" rx="4" fill="url(#grayGradient)"/>
  
  <!-- Texto FULL en dorado -->
  <text x="6" y="22" font-family="Arial Black, Arial, sans-serif" font-size="14" font-weight="900" fill="#D4AF37">FULL</text>
  
  <!-- Texto HD en dorado -->
  <text x="50" y="22" font-family="Arial Black, Arial, sans-serif" font-size="14" font-weight="900" fill="#FFD700">HD</text>
</svg>
