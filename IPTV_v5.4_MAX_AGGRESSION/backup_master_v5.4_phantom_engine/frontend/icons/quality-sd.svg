<svg xmlns="http://www.w3.org/2000/svg" width="50" height="30" viewBox="0 0 50 30">
  <!-- Fondo dorado gradiente -->
  <defs>
    <linearGradient id="goldGradientSD" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo principal -->
  <rect x="0" y="0" width="50" height="30" rx="4" fill="url(#goldGradientSD)"/>
  
  <!-- Texto SD en negro -->
  <text x="8" y="22" font-family="Arial Black, Arial, sans-serif" font-size="16" font-weight="900" fill="#000000">SD</text>
</svg>
