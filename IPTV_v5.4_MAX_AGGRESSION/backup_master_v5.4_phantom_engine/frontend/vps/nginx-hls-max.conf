# ============================================
# 🚀 IPTV Navigator PRO - Nginx HTTPS HLS MAX
# ============================================
# Configuración optimizada para IPTV Toolkit
# CORS MAX + Range + Maximum Resolution
# Fecha: 2026-01-17
# ============================================

# ============================================
# SERVER HTTPS (Puerto 443) - HLS MAX
# ============================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name iptv-ape.duckdns.org;
    
    root /var/www/m3u8;

    # ============================================
    # 🔒 SSL/TLS Configuration (Self-Signed)
    # ============================================
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    
    # SSL Security - TLS 1.2+ only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ============================================
    # 🚀 LÍMITE PARA ARCHIVOS GRANDES (500MB+)
    # ============================================
    client_max_body_size 600M;
    client_body_timeout 600s;
    client_body_buffer_size 128k;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # ============================================
    # 📺 MIME TYPES HLS - Máxima Compatibilidad
    # ============================================
    types {
        application/vnd.apple.mpegurl  m3u8;
        application/x-mpegURL          m3u8;
        video/mp2t                     ts;
        video/iso.segment              m4s;
        video/mp4                      mp4;
        image/svg+xml                  svg;
    }

    # ============================================
    # 🔥 HLS PLAYLIST (.m3u8) - CORS MAX + Range
    # ============================================
    location ~* \.m3u8$ {
        root /var/www/m3u8;
        gzip off;
        default_type application/vnd.apple.mpegurl;

        # --- CORS MAX: Preflight OPTIONS ---
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Accept, User-Agent, Referer, Range, DNT, Cache-Control, X-Requested-With, If-Modified-Since, X-Auth-Token' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Content-Length' 0 always;
            add_header 'Content-Type' 'text/plain; charset=utf-8' always;
            return 204;
        }

        # --- CORS MAX: GET/HEAD ---
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range, Accept-Ranges, ETag, Last-Modified, X-Playlist-Type' always;
        
        # --- Range MAX ---
        add_header 'Accept-Ranges' 'bytes' always;
        
        # --- Cache: NO-CACHE para playlists (live/dinámico) ---
        add_header 'Cache-Control' 'no-cache, no-store, must-revalidate' always;
        add_header 'Pragma' 'no-cache' always;
        add_header 'Expires' '0' always;
        
        # --- Seguridad ---
        add_header 'X-Content-Type-Options' 'nosniff' always;

        limit_except GET HEAD OPTIONS {
            deny all;
        }

        try_files $uri =404;
    }

    # ============================================
    # 🎬 HLS SEGMENTS (.ts/.m4s) - CORS MAX + Range + Cache LARGO
    # ============================================
    location ~* \.(ts|m4s)$ {
        root /var/www/m3u8;
        
        # --- CORS MAX: Preflight OPTIONS ---
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Accept, User-Agent, Referer, Range, DNT, Cache-Control, X-Requested-With, If-Modified-Since' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Content-Length' 0 always;
            add_header 'Content-Type' 'text/plain; charset=utf-8' always;
            return 204;
        }

        # --- CORS MAX: GET/HEAD ---
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range, Accept-Ranges, ETag, Last-Modified' always;
        
        # --- Range MAX (crítico para seek en video) ---
        add_header 'Accept-Ranges' 'bytes' always;
        
        # --- Cache: LARGO (segmentos son inmutables) ---
        add_header 'Cache-Control' 'public, max-age=31536000, immutable' always;
        
        # --- Seguridad ---
        add_header 'X-Content-Type-Options' 'nosniff' always;

        limit_except GET HEAD OPTIONS {
            deny all;
        }

        try_files $uri =404;
    }

    # ============================================
    # 📹 VIDEO MP4 - CORS MAX + Range (para VOD)
    # ============================================
    location ~* \.mp4$ {
        root /var/www/m3u8;
        
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Accept, Range' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Content-Length' 0 always;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range, Accept-Ranges' always;
        add_header 'Accept-Ranges' 'bytes' always;
        add_header 'Cache-Control' 'public, max-age=31536000' always;

        limit_except GET HEAD OPTIONS {
            deny all;
        }

        try_files $uri =404;
    }

    # ============================================
    # PHP Upload Endpoints (sin cambios)
    # ============================================
    location = /upload.php {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, X-Filename, X-Strategy, X-Channels, X-Auth-Token, X-Custom-Filename" always;
            add_header Content-Length 0;
            return 204;
        }

        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        fastcgi_read_timeout 600;
        fastcgi_send_timeout 600;
        fastcgi_connect_timeout 60;
    }

    location = /upload_chunk.php {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, X-Upload-Id, X-Chunk-Index, X-Total-Chunks, X-Chunk-MD5" always;
            add_header Content-Length 0;
            return 204;
        }

        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    location = /finalize_upload.php {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            add_header Content-Length 0;
            return 204;
        }

        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        fastcgi_read_timeout 600;
        fastcgi_send_timeout 600;
    }

    location = /upload_status.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ============================================
    # 📂 DIRECTORIO /lists/ - Gateway Manager Compatible
    # ============================================
    # CRÍTICO: El Gateway Manager construye URLs con /lists/
    # Esta ruta sirve archivos directamente desde /var/www/m3u8
    # ============================================
    location /lists/ {
        alias /var/www/m3u8/;
        autoindex off;
        
        # --- CORS MAX para playlists ---
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Accept, User-Agent, Referer, Range, DNT, Cache-Control, X-Requested-With, If-Modified-Since, X-Auth-Token' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Content-Length' 0 always;
            add_header 'Content-Type' 'text/plain; charset=utf-8' always;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range, Accept-Ranges, ETag, Last-Modified' always;
        add_header 'Accept-Ranges' 'bytes' always;
        add_header 'Cache-Control' 'no-cache, no-store, must-revalidate' always;
        add_header 'X-Content-Type-Options' 'nosniff' always;
        
        # MIME types para M3U8
        types {
            application/vnd.apple.mpegurl m3u8;
            application/x-mpegURL m3u8;
            audio/x-mpegurl m3u;
        }
        
        try_files $uri =404;
    }

    # ============================================
    # Directorio de versiones
    # ============================================
    location /versions/ {
        autoindex off;
        default_type application/vnd.apple.mpegurl;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Expose-Headers 'Content-Length, Accept-Ranges' always;
        add_header Accept-Ranges bytes always;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # ============================================
    # Iconos SVG
    # ============================================
    location /icons/ {
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # ============================================
    # Root - Archivos estáticos
    # ============================================
    location / {
        # CORS para cualquier otro archivo
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Accept-Ranges' 'bytes' always;
        try_files $uri $uri/ =404;
    }

    # ============================================
    # Health Check
    # ============================================
    location = /health {
        rewrite ^/health$ /health.php last;
    }
    
    location = /health.php {
        access_log off;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ============================================
    # Status del servidor
    # ============================================
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }

    # ============================================
    # Seguridad - Bloquear archivos sensibles
    # ============================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
        return 204;
    }

    location ~* \.(ini|log|sql|bak|env)$ {
        return 404;
    }

    location ~ /\.ht {
        deny all;
    }
}

# ============================================
# SERVER HTTP (Puerto 80) - Redirect to HTTPS
# ============================================
server {
    listen 80;
    listen [::]:80;
    server_name iptv-ape.duckdns.org;
    
    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}
