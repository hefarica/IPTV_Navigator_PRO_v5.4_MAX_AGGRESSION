server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /var/www/m3u8;

    # ============================================
    # 🚀 LÍMITE PARA ARCHIVOS DE 500MB+
    # ============================================
    client_max_body_size 600M;
    client_body_timeout 600s;
    client_body_buffer_size 128k;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # ============================================
    # CORS Global
    # ============================================
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, X-Filename, X-Strategy, X-Channels, X-Auth-Token, X-Custom-Filename, X-Upload-Id, X-Chunk-Index, X-Total-Chunks, X-Chunk-MD5" always;

    # ============================================
    # PHP Upload Endpoint (Directo - hasta 500MB)
    # ============================================
    location = /upload.php {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, X-Filename, X-Strategy, X-Channels, X-Auth-Token, X-Custom-Filename" always;
            add_header Content-Length 0;
            return 204;
        }

        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Timeout extendido para archivos muy grandes (500MB+)
        fastcgi_read_timeout 600;
        fastcgi_send_timeout 600;
        fastcgi_connect_timeout 60;
    }

    # ============================================
    # PHP Chunked Upload Endpoint
    # ============================================
    location = /upload_chunk.php {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, X-Upload-Id, X-Chunk-Index, X-Total-Chunks, X-Chunk-MD5" always;
            add_header Content-Length 0;
            return 204;
        }

        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    # ============================================
    # PHP Finalize Upload Endpoint
    # ============================================
    location = /finalize_upload.php {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            add_header Content-Length 0;
            return 204;
        }

        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Timeout largo para ensamblar archivos grandes
        fastcgi_read_timeout 600;
        fastcgi_send_timeout 600;
    }

    # ============================================
    # PHP Upload Status Endpoint
    # ============================================
    location = /upload_status.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ============================================
    # Archivos M3U8 - Content-Type correcto
    # ============================================
    location ~* \.m3u8$ {
        # IPTV-Grade Stability: Garantizar GET/HEAD y evitar 405
        root /var/www/m3u8;
        gzip off;
        default_type application/vnd.apple.mpegurl;

        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires 0 always;
        add_header Accept-Ranges bytes;
        add_header X-Content-Type-Options nosniff;

        limit_except GET HEAD {
            deny all;
        }

        try_files $uri =404;
    }

    # ============================================
    # Directorio de versiones
    # ============================================
    location /versions/ {
        autoindex off;
        default_type application/vnd.apple.mpegurl;
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # ============================================
    # Iconos SVG
    # ============================================
    location /icons/ {
        types {
            image/svg+xml svg;
        }
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # ============================================
    # Root - Archivos estáticos
    # ============================================
    location / {
        try_files $uri $uri/ =404;
    }

    # ============================================
    # Health Check (PHP Dinámico)
    # ============================================
    location = /health {
        rewrite ^/health$ /health.php last;
    }
    
    location = /health.php {
        access_log off;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ============================================
    # Status del servidor (para monitoreo)
    # ============================================
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }

    # ============================================
    # Bloquear archivos ocultos
    # ============================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ============================================
    # Favicon
    # ============================================
    location = /favicon.ico {
        log_not_found off;
        access_log off;
        return 204;
    }

    # ============================================
    # 🛡️ BLOQUEO: NO VIDEO EN VPS (Hardening)
    # ============================================
    location ~* \.(ts|m4s|mp4)$ {
        return 404;
    }

    # Bloquear archivos sensibles
    location ~* \.(ini|log|sql|bak|env)$ {
        return 404;
    }

    location ~ /\.ht {
        deny all;
    }
}
