# IPTV INTERCEPT — SAFE MODE (sin prefetch, cache corto, respeta max_connections)

upstream x1megaott_upstream {
    server 149.18.45.78:80 max_fails=0;
    server 149.18.45.119:80 max_fails=0;
    server 149.18.45.189:80 max_fails=0;
    # keepalive removed (RST on stale conn)
}
upstream line_tivi_upstream {
    server 91.208.115.23:80 max_fails=0;
    # keepalive removed (RST on stale conn)
}
upstream ky_tv_upstream {
    server 172.110.220.61:80 max_fails=0;
    # keepalive removed (RST on stale conn)
}
upstream tivigo_upstream {
    server 154.6.41.6:80 max_fails=0;
    server 154.6.41.66:80 max_fails=0;
    server 154.6.41.126:80 max_fails=0;
    server 154.6.41.186:80 max_fails=0;
    # keepalive removed (RST on stale conn)
}


log_format iptv_intercept '$remote_addr $upstream_cache_status [$time_iso8601] "$request" '
                          '$status $body_bytes_sent ut=$upstream_response_time rt=$request_time '
                          '"$http_user_agent" host=$host';

# ===== nfqdeuxu.x1megaott.online =====
server {
    listen 80;
    server_name nfqdeuxu.x1megaott.online;
    allow 181.63.176.21;
    allow 10.200.0.0/24;
    allow 127.0.0.1/8;
    deny all;
    access_log /var/log/nginx/iptv_intercept.log iptv_intercept;

    # Paths con signed tokens /hlsr/ — NO CACHE (tokens expiran rápido)
    location ~* /hlsr/ {
        proxy_pass http://x1megaott_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host nfqdeuxu.x1megaott.online;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Referer $http_referer;
        proxy_cache off;
        proxy_buffering on;
        proxy_buffer_size 32k;
        proxy_buffers 32 32k;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        add_header X-Cache-Status NOCACHE always;
    }

    # Manifest .m3u8 — cache MUY corto
    location ~* \.m3u8$ {
        proxy_pass http://x1megaott_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host nfqdeuxu.x1megaott.online;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Referer $http_referer;
        proxy_cache iptv_cache;
        proxy_cache_valid 200 206 2s;
        proxy_cache_valid 302 301 2s;
        proxy_cache_valid 403 401 0;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 3s;
        proxy_cache_use_stale updating timeout;
        proxy_cache_background_update on;
        proxy_buffering on;
        proxy_buffer_size 32k;
        proxy_buffers 32 32k;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    location ~* \.ts$ {
        slice 1m;
        proxy_cache_key $scheme$proxy_host$uri$slice_range;
        proxy_pass http://x1megaott_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host nfqdeuxu.x1megaott.online;
        proxy_set_header Range $slice_range;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Referer $http_referer;
        proxy_cache iptv_cache;
        proxy_cache_valid 200 206 10m;
        proxy_cache_valid 403 401 0;
        proxy_cache_lock on;
        proxy_cache_use_stale error timeout;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 128 64k;
        proxy_busy_buffers_size 256k;
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header X-Quantum-Slice 1m always;
    }

    location / {
        proxy_pass http://x1megaott_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host nfqdeuxu.x1megaott.online;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Referer $http_referer;
        proxy_cache iptv_cache;
        proxy_cache_valid 200 5s;
        proxy_cache_valid 403 401 0;
        proxy_cache_lock on;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        add_header X-Cache-Status $upstream_cache_status always;
    }
}

