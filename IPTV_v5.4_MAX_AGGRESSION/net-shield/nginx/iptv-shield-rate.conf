# ═══════════════════════════════════════════════════════════════════════════
# NET SHIELD — Hard cap anti-DOS only (NO anti-bot logic).
# Anti-bot vive en Lua circuit breaker (upstream_gate.lua + upstream_response.lua)
# ───────────────────────────────────────────────────────────────────────────
# Calibración basada en medición real (Fase A 2026-04-25 15:57 UTC):
#   p95 global = 2 r/s, max = 3 r/s (excluyendo ruido propio + cache)
#   rate=30 r/s = 15× sobre p95 real → no toca tráfico humano
#   burst=200 nodelay = absorbe ráfagas de zapping sin queue/delay
#
# MEJORA 2026-04-26: Migración de set $2/$3 a map para blindar contra
#   clobbering de capturas numeradas en auth_request subrequests.
#   Ref: Plan Técnico §0, §4 (shield_host clobber fix)
# ═══════════════════════════════════════════════════════════════════════════

# ─── MAP 1: Extrae upstream HOST del path /shield/{token}/{host}/... ───
# Reemplaza: set $shield_host $2 (vulnerable a clobber en subrequests)
# Consolidado con $shield_upstream_host (eran idénticos, ahora es uno solo)
map $request_uri $shield_host {
    "~^/shield/[a-f0-9]+/([^/]+)/"  "$1";
    default                          "";
}

# ─── MAP 2: Extrae PATH del path /shield/{token}/{host}/{path...} ───
# Reemplaza: set $shield_path /$3$is_args$args (vulnerable a clobber)
# Nota: $is_args$args se agrega en el location via proxy_pass, no aquí
map $request_uri $shield_path {
    "~^/shield/[a-f0-9]+/[^/]+/(.*)$"  "/$1";
    default                              "/";
}

# ─── MAP 3: Resuelve upstream block name por host ───
# Reemplaza: cadena de if() en shield-location.conf
map $shield_host $shield_upstream {
    "nfqdeuxu.x1megaott.online"  "x1megaott_upstream";
    "line.tivi-ott.net"          "line_tivi_upstream";
    "ky-tv.cc"                   "ky_tv_upstream";
    "tivigo.cc"                  "tivigo_upstream";
    default                      "";
}

# Hard cap: rate sostenido + burst grande + nodelay (rechazo inmediato si excede)
# AUTOPISTA 2026-04-26: 30→100 r/s para no frenar zapping legítimo ni descarga paralela
# Solo frena scraping >100 r/s sostenido al MISMO upstream (DOS real)
limit_req_zone $shield_host zone=hard_cap:10m rate=100r/s;

