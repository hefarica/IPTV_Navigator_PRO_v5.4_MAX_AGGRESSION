# NET SHIELD — Fase 3.5 Capa 4 PHASE 2 — Integración OpenResty/Lua
# ⚠ NO APLICAR TODAVÍA. Requiere instalar OpenResty (reemplaza nginx vanilla).
# ───────────────────────────────────────────────────────────────────────────
# Pre-requisitos:
#   - Validar 24-72h fase vanilla NGINX (limit_req + limit_conn) en producción
#   - Instalar OpenResty (apt remove nginx + apt install openresty, ventana
#     larga porque hay restart total del proceso)
#   - Migrar shield-location.conf a openresty config tree
#   - Subir lua/upstream_gate.lua y lua/upstream_response.lua al VPS
# ═══════════════════════════════════════════════════════════════════════════

# En http {} block (ej: /etc/nginx/conf.d/00-iptv-quantum.conf o nginx.conf):
http {
    # Memoria compartida para state machine por upstream host
    # 20MB ≈ ~250k entries (key host + value state)
    lua_shared_dict upstream_state 20m;

    # ... resto de http config existente ...
}

# En location /shield/{owner}/{host}/... (shield-location.conf migrado):
location ~ ^/shield/([a-f0-9]+)/([^/]+)/(.*)$ {
    # ── Hook PRE: gate de cooldown ─────────────────────────────────────────
    # Si el host está en cooldown activo, return 503 ANTES de tocar upstream
    access_by_lua_file /usr/local/openresty/nginx/conf/lua/upstream_gate.lua;

    # ── Hook POST: state machine ───────────────────────────────────────────
    # Lee status del upstream, actualiza retry/cooldown, emite headers X-APE-*
    header_filter_by_lua_file /usr/local/openresty/nginx/conf/lua/upstream_response.lua;

    # ── Resto de directivas (mantener las del shield-location.conf actual) ─
    auth_request /_shield_auth;
    auth_request_set $shield_owner $upstream_http_x_shield_owner;

    # Slot protection (1 manifest concurrent por user/pass) — INTACTO
    limit_conn xtream_slot 1;
    limit_conn_status 429;

    # Vanilla rate governance — MANTENER incluso con Lua activo (defense-in-depth)
    limit_req zone=stealth_upstream_req burst=15 delay=10;
    limit_req_status 429;
    limit_conn stealth_upstream_conn 4;

    # Upstream selection (sin cambios)
    set $shield_host $2;
    set $shield_path /$3$is_args$args;
    set $shield_upstream "";
    if ($shield_host = "nfqdeuxu.x1megaott.online") { set $shield_upstream "x1megaott_upstream"; }
    if ($shield_host = "line.tivi-ott.net")        { set $shield_upstream "line_tivi_upstream"; }
    if ($shield_host = "ky-tv.cc")                 { set $shield_upstream "ky_tv_upstream"; }
    if ($shield_host = "tivigo.cc")                 { set $shield_upstream "tivigo_upstream"; }
    if ($shield_upstream = "") { return 403; }

    proxy_pass http://$shield_upstream$shield_path;

    # ... resto de directivas existentes (headers off, cache, etc) ...
}

# ───────────────────────────────────────────────────────────────────────────
# COMPORTAMIENTO RESULTANTE (post-deploy)
# ───────────────────────────────────────────────────────────────────────────
# Upstream OK 2xx          → header X-APE-Circuit: reset, state limpio, DICTATOR.
# Upstream rechaza 4xx     → state.retry++, cooldownUntil += backoff(1→2→4→8s+jitter).
#                            Próxima request al mismo host dentro de cooldown → 503 inmediato (gate).
# 5° error consecutivo     → cooldown random(5-15min). Reset retry counter.
# Logs                     → /var/log/nginx/error.log con prefijo [APE-CIRCUIT]
# Headers debug             → X-APE-Circuit, X-APE-Upstream, X-APE-Retry, X-APE-Delay-Ms
#
# DOCTRINA RESPETADA
#   ✓ Upstream OK            → DICTATOR agresivo
#   ✓ Upstream rechaza       → STEALTH humano (backoff + jitter)
#   ✓ Upstream bloquea       → COOLDOWN paciente (5-15min)
#   ✓ TTFB <200ms preservado → gate solo dispara si HAY cooldown previo
#
# RIESGOS A MEDIR EN STAGING
#   - lua_shared_dict 20m: monitor uso, ajustar a 50m si llena
#   - math.randomseed por worker: ok para jitter humano
#   - Race conditions en dict:get + dict:set: aceptable, peor caso = doble
#     decremento de retry, no afecta correctness (estado eventualmente consistente)
