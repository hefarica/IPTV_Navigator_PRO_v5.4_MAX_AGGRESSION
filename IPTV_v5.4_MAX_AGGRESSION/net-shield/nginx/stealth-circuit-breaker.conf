# ═══════════════════════════════════════════════════════════════════════════
# NET SHIELD — Fase 3.5 Capa 4 (Rate Governance + Circuit Breaker)
# Sub-proyecto B (vanilla NGINX, low risk). Antesala del Sub-proyecto B' (OpenResty/Lua).
# ───────────────────────────────────────────────────────────────────────────
# OBJETIVO: el VPS no martillea al upstream cuando éste responde 403/429/RST.
# Cool-down implícito vía limit_req + retry conservador (proxy_next_upstream).
#
# DOCTRINA RESPETADA:
#   - feedback_vps_zapping_atomico_inviolable.md: TTFB <200ms manifest preservado
#     mediante rate calibrado y burst suficiente para zapping humano normal.
#   - reference_xtream_slot_protection.md: limit_conn xtream_slot=1 ya existente
#     se MANTIENE — esta config NO lo reemplaza, COEXISTE.
#   - feedback_shield_proxy_pass_request_headers_off.md: no se toca header rule.
#
# DEPENDE de: el shield real (no committed al repo, vive en VPS) define el
#   server/location donde estos limit_req se aplican. Este archivo se incluye
#   en /etc/nginx/conf.d/stealth-cb.conf (zones globales) + se referencia desde
#   el location del shield (limit_req zone=...).
# ═══════════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────
# ZONES (van en http {} context — incluir en /etc/nginx/conf.d/ )
# ───────────────────────────────────────────────────────────────────────────

# OPCIÓN A — AGRESIVA (spec original usuario): rate=1r/s burst=3 nodelay
#   ⚠ RIESGO ZAPPING: 4 zaps/3seg al MISMO upstream → 503 instant en el 4°.
#   Aceptable si la mayoría del zapping es entre upstreams DISTINTOS.
#
# limit_req_zone  $proxy_host  zone=upstream_req_aggressive:10m  rate=1r/s;

# OPCIÓN B — ZAPPING-SAFE (recomendada para arrancar): rate=3r/s burst=15 delay=10
#   3 req/s sostenido por upstream + buffer 15. Excedente entre 10 y 15: encolado
#   con delay (no rechazo). Sólo >15 instantáneo = 503.
#   Esto preserva zapping humano (10-15 zaps en ráfaga OK) y enfría sólo cuando
#   hay scraping real.
limit_req_zone  $proxy_host  zone=upstream_req:10m  rate=3r/s;

# Conn por upstream — coexiste con xtream_slot=1 ya desplegado (key distinto).
# xtream_slot agrupa por user/pass del Xtream; este agrupa por upstream host.
limit_conn_zone $proxy_host  zone=upstream_conn:10m;

# ───────────────────────────────────────────────────────────────────────────
# LOCATION (va dentro del location del shield — incluir desde sites-available)
# ───────────────────────────────────────────────────────────────────────────
# Ejemplo de uso (NO incluir literal en conf.d, esto es referencia):
#
# location /shield/ {
#     # Rate governance per-upstream
#     limit_req       zone=upstream_req   burst=15  delay=10;
#     limit_req_status 429;                    # devuelve 429 (no 503) al cliente — el ONN 4K lo trata como retry-able
#     limit_conn      upstream_conn  4;        # max 4 conn concurrentes por upstream (sumado a xtream_slot=1 por user)
#     limit_conn_status 429;
#
#     # Circuit breaker básico vía proxy_next_upstream
#     #   - Si upstream responde 500/502/503/504 o timeout, se intenta UNA vez más con otro upstream del bloque.
#     #   - 403/429 NO entran en next_upstream — se devuelven tal cual al cliente (correcto: el provider está rechazando, no insistir).
#     proxy_next_upstream         error timeout http_500 http_502 http_503 http_504;
#     proxy_next_upstream_tries   2;
#     proxy_next_upstream_timeout 8s;
#
#     # Timeouts conservadores
#     proxy_connect_timeout       5s;
#     proxy_send_timeout          10s;
#     proxy_read_timeout          15s;
#
#     # Buffering: KEEP OFF para HLS (zapping atómico TTFB <200ms).
#     # NO encender — viola feedback_vps_zapping_atomico_inviolable.md.
#     # proxy_buffering on;            # ❌ NO
#     # proxy_cache_lock on;           # ❌ NO (introduce 10s adicional al primer request del manifest)
#     # proxy_cache_lock_timeout 10s;  # ❌ NO
#
#     # ... resto de directivas existentes del shield (proxy_pass, headers off, etc) ...
# }

# ───────────────────────────────────────────────────────────────────────────
# NOTAS DE CIRCUIT BREAKER
# ───────────────────────────────────────────────────────────────────────────
# Esta config implementa rate governance + retry conservador, NO máquina de
# estados por upstream con cooldown 5–15min. Para eso se necesita Sub-proyecto B'
# (OpenResty/Lua, lua_shared_dict por host) — runbook separado.
#
# Lo que SÍ logra esta config:
#   ✅ Limita req/s al upstream → reduce probabilidad de gatillar 429.
#   ✅ limit_conn evita slot exhaustion paralelo al xtream_slot=1.
#   ✅ proxy_next_upstream solo en 5xx/timeout → no insiste tras 403/429.
#   ✅ Timeouts cortos liberan slots rápido si upstream se pone lento.
#
# Lo que NO logra (requiere Lua):
#   ❌ Cooldown explícito 5–15min tras N errores 4xx consecutivos por upstream.
#   ❌ Backoff 1→2→4→8s entre reintentos al mismo upstream.
#   ❌ Reset automático tras 2xx.
