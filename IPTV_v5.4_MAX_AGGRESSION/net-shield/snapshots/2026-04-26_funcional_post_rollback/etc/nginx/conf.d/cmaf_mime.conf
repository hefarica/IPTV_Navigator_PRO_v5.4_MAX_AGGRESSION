# ═══════════════════════════════════════════════════════════════════════════
# APE v18.2 — PASO 5: Nginx MIME Types para CMAF/fMP4
# Añadir dentro del bloque http {} en /etc/nginx/nginx.conf
# O incluir como: include /etc/nginx/conf.d/cmaf_mime.conf;
# ═══════════════════════════════════════════════════════════════════════════

types {
    # ── CMAF / fMP4 ─────────────────────────────────────────────────────
    video/mp4                           mp4 m4v m4s;
    video/iso.segment                   m4s;
    audio/mp4                           m4a;

    # ── DASH ────────────────────────────────────────────────────────────
    application/dash+xml                mpd;

    # ── HLS ─────────────────────────────────────────────────────────────
    application/vnd.apple.mpegurl       m3u8;
    application/x-mpegurl               m3u;

    # ── MPEG-TS (legado) ────────────────────────────────────────────────
    video/mp2t                          ts;
}

