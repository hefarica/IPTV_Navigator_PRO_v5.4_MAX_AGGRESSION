# ===== zivovrix.cc CDN (redirect target de tivigo.cc) — añadido 2026-04-25 =====
# Provider tivigo.cc emite 302 con Location apuntando a {N}.zivovrix.cc
# Sin esta intercepción, el cliente del ONN sigue el 302 fuera del shield
# y queda sin SurfShark + sin xtream_slot + sin cache → canal no entra.
#
# Patrón idéntico a tivigo.cc (mismas locations + cache policy).
# Diferencias mínimas:
#   - server_name wildcard (subdominios dinámicos: 6840785, 1, 100, ...)
#   - proxy_set_header Host $host (subdomain dinámico, NO hardcoded)

upstream zivovrix_upstream {
    server 154.6.152.13:80 max_fails=0;
    # keepalive removed (RST on stale conn)
}

server {
    listen 80;
    server_name *.zivovrix.cc zivovrix.cc;
    allow 181.63.176.21;
    allow 10.200.0.0/24;
    allow 127.0.0.1/8;
    deny all;
    access_log /var/log/nginx/iptv_intercept.log iptv_intercept;

    # Paths con signed tokens /hlsr/ — NO CACHE (tokens expiran rápido)
    location ~* /hlsr/ {
        proxy_pass http://zivovrix_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Referer $http_referer;
        proxy_cache off;
        proxy_buffering on;
        proxy_buffer_size 32k;
        proxy_buffers 32 32k;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        add_header X-Cache-Status NOCACHE always;
    }

    # Manifests m3u8 — cache 2s para coalescing entre clientes
    location ~* \.m3u8$ {
        proxy_pass http://zivovrix_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Referer $http_referer;
        proxy_cache iptv_cache;
        proxy_cache_valid 200 206 2s;
        proxy_cache_valid 302 301 2s;
        proxy_cache_valid 403 401 0;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 3s;
        proxy_cache_use_stale updating timeout;
        proxy_cache_background_update on;
        proxy_buffering on;
        proxy_buffer_size 32k;
        proxy_buffers 32 32k;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # Segments .ts — cache slice 1m, hold tiempo largo
    location ~* \.ts$ {
        slice 1m;
        proxy_cache_key $scheme$proxy_host$uri$slice_range;
        proxy_pass http://zivovrix_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header Range $slice_range;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Referer $http_referer;
        proxy_cache iptv_cache;
        proxy_cache_valid 200 206 10m;
        proxy_cache_valid 403 401 0;
        proxy_cache_lock on;
        proxy_cache_use_stale error timeout;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 128 64k;
        proxy_busy_buffers_size 256k;
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header X-Quantum-Slice 1m always;
    }

    # Default (player_api.php, get_short_epg, etc.)
    location / {
        proxy_pass http://zivovrix_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Referer $http_referer;
        proxy_cache iptv_cache;
        proxy_cache_valid 200 206 30s;
        proxy_cache_valid 302 301 2s;
        proxy_cache_lock on;
        proxy_buffering on;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        add_header X-Cache-Status $upstream_cache_status always;
    }
}
