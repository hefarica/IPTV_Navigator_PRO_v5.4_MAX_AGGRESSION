# ═══════════════════════════════════════════════════════════════════════════
# NET SHIELD — Hard cap anti-DOS only (NO anti-bot logic).
# Anti-bot vive en Lua circuit breaker (upstream_gate.lua + upstream_response.lua)
# ───────────────────────────────────────────────────────────────────────────
# Calibración basada en medición real (Fase A 2026-04-25 15:57 UTC):
#   p95 global = 2 r/s, max = 3 r/s (excluyendo ruido propio + cache)
#   rate=10 r/s = 5× sobre p95 real → no toca tráfico humano
#   burst=50 nodelay = absorbe ráfagas de zapping sin queue/delay
# ═══════════════════════════════════════════════════════════════════════════

# Extrae upstream host del path /shield/{owner}/{host}/...
# Vacío para paths fuera de /shield/ → limit_req no aplica (comportamiento documentado)
map $request_uri $shield_upstream_host {
    "~^/shield/[^/]+/([^/]+)/"  "$1";
    default                       "";
}

# Hard cap: rate sostenido + burst grande + nodelay (rechazo inmediato si excede)
# Esto NO golpea tráfico legítimo. Solo scraping >10 r/s sostenido al MISMO upstream.
limit_req_zone $shield_upstream_host zone=hard_cap:10m rate=30r/s;
