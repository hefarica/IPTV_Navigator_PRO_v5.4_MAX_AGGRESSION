# ===============================================================
# NGINX TURBO — NET SHIELD IPTV ready (2026-04-20)
# Capacity target: 500+ concurrent streams, 40k connections max
# ===============================================================
user www-data;
worker_processes auto;
worker_rlimit_nofile 200000;
worker_shutdown_timeout 30s;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

thread_pool iptv threads=32 max_queue=65536;

events {
    worker_connections 20000;
    use epoll;
    multi_accept on;
    accept_mutex off;
}

http {
    # Basic
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;
    types_hash_max_size 2048;
    server_names_hash_bucket_size 128;
    
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Keepalive agresivo (IPTV reuses connections)
    keepalive_timeout 65;
    keepalive_requests 100000;
    reset_timedout_connection on;

    # Client buffers para listas 300+ MB
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 8 16k;
    client_max_body_size 600M;
    client_body_timeout 120s;
    client_header_timeout 60s;
    send_timeout 180s;

    # Output buffers (streaming friendly)
    output_buffers 4 64k;
    postpone_output 1460;

    # Open file cache (crucial para listas cached)
    open_file_cache max=200000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 1;
    open_file_cache_errors on;

    # SSL tuning (TLS reuse = menos CPU)
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets on;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_buffer_size 8k;

    # Gzip (para manifests y JSON)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 1024;
    gzip_types application/vnd.apple.mpegurl application/x-mpegurl application/json application/javascript text/css text/plain text/xml;
    gzip_static on;

    # Logs
    log_format iptv '$remote_addr $upstream_cache_status [$time_iso8601] "$request" $status $body_bytes_sent $request_time';
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Proxy cache para IPTV segments
    proxy_cache_path /dev/shm/nginx_cache
        levels=1:2
        keys_zone=iptv_cache:500m
        max_size=1500m
        inactive=2h
        use_temp_path=off
        loader_threshold=1000
        loader_files=2000;

    # Upstream hosts keepalive (reduce handshake overhead al provider)

    # Include virtual hosts
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
