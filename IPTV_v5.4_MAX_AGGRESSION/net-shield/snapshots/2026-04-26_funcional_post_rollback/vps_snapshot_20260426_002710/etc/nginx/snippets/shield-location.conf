location = /_shield_auth {
    internal;
    fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    fastcgi_param SCRIPT_FILENAME /var/www/html/api/shield-auth.php;
    fastcgi_param SCRIPT_NAME /api/shield-auth.php;
    fastcgi_param REQUEST_METHOD GET;
    fastcgi_param QUERY_STRING "";
    fastcgi_param CONTENT_TYPE "";
    fastcgi_param CONTENT_LENGTH "";
    fastcgi_param DOCUMENT_ROOT /var/www/html;
    fastcgi_param REQUEST_URI /api/shield-auth.php;
    fastcgi_param SERVER_PROTOCOL $server_protocol;
    fastcgi_param HTTP_X_ORIGINAL_URI $request_uri;
    fastcgi_param HTTP_X_ORIGINAL_HOST $host;
    fastcgi_param HTTP_X_REAL_IP $remote_addr;
    fastcgi_param HTTPS on;
}

location ~ ^/shield/([a-f0-9]+)/([^/]+)/(.*)$ {
    auth_request /_shield_auth;
    auth_request_set $shield_owner $upstream_http_x_shield_owner;

    # >>> NET SHIELD Fase 3.5 Phase 2: Lua Circuit Breaker <<<
    # PRE: gate de cooldown — si host en cooldown activo → 503 sin tocar upstream
    access_by_lua_file /etc/nginx/lua/upstream_gate.lua;
    # POST: state machine — actualiza retry/cooldown según status del upstream
    header_filter_by_lua_file /etc/nginx/lua/upstream_response.lua;
    # <<< End Phase 2 <<<

    # Slot protection (1 manifest concurrent por user/pass)
    limit_conn xtream_slot 1;
    limit_conn_status 429;
    # >>> NET SHIELD Hard cap (anti-DOS only, NO anti-bot — eso es Lua) <<<
    limit_req      zone=hard_cap   burst=200 nodelay;
    limit_req_status 429;
    # <<< End hard cap <<<


    set $shield_host $2;
    set $shield_path /$3$is_args$args;

    set $shield_upstream "";
    if ($shield_host = "nfqdeuxu.x1megaott.online") { set $shield_upstream "x1megaott_upstream"; }
    if ($shield_host = "line.tivi-ott.net")        { set $shield_upstream "line_tivi_upstream"; }
    if ($shield_host = "ky-tv.cc")                 { set $shield_upstream "ky_tv_upstream"; }
    if ($shield_host = "tivigo.cc")                 { set $shield_upstream "tivigo_upstream"; }
    if ($shield_upstream = "") { return 403; }

    proxy_pass http://$shield_upstream$shield_path;

    # Headers críticos: Host real del Xtream + UA real (anti-fingerprint) + Referer consistente
    proxy_pass_request_headers off;
    proxy_set_header Accept "*/*";
    proxy_set_header Host $shield_host;
    proxy_set_header User-Agent "Mozilla/5.0 (Linux; Android 10; AFTKA) AppleWebKit/537.36 (KHTML, like Gecko) Silk/112.3.1 like Chrome/112.0.5615.213 Safari/537.36";
    proxy_set_header Referer "https://www.netflix.com/";

    # Cache: clave sin args (HIT entre zaps con distinto ape_sid)
    proxy_cache iptv_cache;
    proxy_cache_key "$scheme$shield_host/$3";
    proxy_cache_valid 200 206 20s;
    proxy_cache_valid 302 301 0;
    proxy_cache_valid 403 401 0;
    proxy_cache_lock on;
    proxy_cache_lock_timeout 3s;
    proxy_cache_min_uses 1;
    proxy_cache_methods GET HEAD;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_background_update on;
    proxy_ignore_headers Cache-Control Expires Set-Cookie X-Accel-Expires;

    # No cache para signed token paths
    set $shield_no_cache 0;
    if ($request_uri ~* "/hlsr/") { set $shield_no_cache 1; }
    proxy_cache_bypass $shield_no_cache;
    proxy_no_cache $shield_no_cache;

    proxy_buffering on;
    proxy_buffer_size 32k;
    proxy_buffers 32 32k;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    add_header X-Cache-Status $upstream_cache_status always;
    add_header X-Shield-Owner $shield_owner always;
    add_header X-Shield-Host $shield_host always;
    access_log /var/log/nginx/shield_access.log iptv_intercept;
    error_log /var/log/nginx/shield_error.log warn;
}
