# ═══════════════════════════════════════════════════════════════════════════════
# WireGuard Client Config — Template for New Player Device
# ═══════════════════════════════════════════════════════════════════════════════
#
# Instructions:
# 1. Generate a new keypair on the VPS:
#      wg genkey | tee /tmp/wg_newdevice_private | wg pubkey > /tmp/wg_newdevice_public
#
# 2. Add the peer to the VPS WireGuard config (/etc/wireguard/wg0.conf):
#      [Peer]
#      # <DEVICE_NAME>
#      PublicKey = <contents of /tmp/wg_newdevice_public>
#      AllowedIPs = 10.200.0.X/32
#
# 3. Restart WireGuard on VPS:
#      wg-quick down wg0 && wg-quick up wg0
#
# 4. Install this config on the Android device using the WireGuard app
#    (import from QR code or file)
#
# 5. Replace ALL placeholders below with real values:
#    - <DEVICE_PRIVATE_KEY>: contents of /tmp/wg_newdevice_private
#    - <VPS_PUBLIC_KEY>: public key of the VPS wg0 interface
#    - 10.200.0.X: unique IP for this device (use .5, .6, .7, etc.)
# ═══════════════════════════════════════════════════════════════════════════════

[Interface]
# Device private key (generated in step 1)
PrivateKey = <DEVICE_PRIVATE_KEY>

# Unique IP for this device on the WireGuard network
Address = 10.200.0.X/24

# DNS through the VPS (optional — use if you want DNS hijacking)
DNS = 10.200.0.1

# Keep MTU consistent with VPS
MTU = 1420

[Peer]
# VPS public key
PublicKey = <VPS_PUBLIC_KEY>

# VPS endpoint (your Hetzner IP)
Endpoint = 178.156.147.234:51820

# Route all traffic through VPS (for IPTV)
# Or use 10.200.0.0/24 for VPN-only traffic
AllowedIPs = 0.0.0.0/0

# Keep the tunnel alive (important for ADB over WireGuard)
PersistentKeepalive = 25
