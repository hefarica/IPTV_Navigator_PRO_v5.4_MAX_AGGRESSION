# ═══════════════════════════════════════════════════════════════════════════
# IPTV Brazil Backup Loopback — Fase F L1 Vacuum Mode (2026-05-11)
# Aplicado per user doctrine "failover imperceptible <500ms"
#
# Cómo funciona:
#   1. Upstreams principales (Miami via wg-surfshark) en iptv-intercept.conf
#      tienen "server 127.0.0.1:9181 backup" como failover
#   2. Cuando 3 fails en 10s o 403/500/502/503/504, NGINX trata backup loopback
#   3. Backup loopback bindea a phantom IP 10.99.99.2
#   4. Tráfico desde 10.99.99.2 va por table 200 -> wg-surfshark-br (Brasil)
#   5. MASQUERADE substituye phantom IP por IP válida antes de wg-surfshark-br
#
# Vacuum Mode (proxy_buffers 32 MB) SOLO en backup, no en primary:
#   - 1 stream peak ~96-128 MB (3-4 segments paralelos)
#   - 3 streams peak ~288-384 MB (safe en 1.6 GB libre VPS)
#   - Player rellena buffer en ~3-5s vs ~10-15s sin Vacuum
# ═══════════════════════════════════════════════════════════════════════════

# Upstream Brasil para cada provider (apunta directo a IPs reales del provider)
upstream tivigo_brazil_upstream {
    server 154.6.41.6:80   max_fails=0;
    server 154.6.41.66:80  max_fails=0;
    server 154.6.41.126:80 max_fails=0;
    server 154.6.41.186:80 max_fails=0;
}
upstream x1megaott_brazil_upstream {
    server 149.18.45.78:80  max_fails=0;
    server 149.18.45.119:80 max_fails=0;
    server 149.18.45.189:80 max_fails=0;
}
upstream line_tivi_brazil_upstream {
    server 91.208.115.23:80 max_fails=0;
}
upstream ky_tv_brazil_upstream {
    server 172.110.220.61:80 max_fails=0;
}

# ─── tivigo.cc backup :9181 ─────────────────────────────────────────────
server {
    listen 127.0.0.1:9181;
    server_name tivigo_brazil_backup;
    
    # ═══ VACUUM MODE 32 MB — solo en backup, primary mantiene 8 MB ═══
    proxy_buffering on;
    proxy_buffer_size 64k;
    proxy_buffers 512 64k;              # 32 MB pipeline (vs 8 MB primary)
    proxy_busy_buffers_size 512k;
    proxy_max_temp_file_size 0;          # 100% RAM, no disco
    
    # Timeouts agresivos
    proxy_connect_timeout 2s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    
    location / {
        # ═══ Phantom IP forces egress via wg-surfshark-br ═══
        proxy_bind 10.99.99.2;
        proxy_pass http://tivigo_brazil_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host tivigo.cc;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Referer $http_referer;
        proxy_cache off;
        add_header X-Failover "BRAZIL_VACUUM" always;
    }
}

