log_format iptv_intercept '$remote_addr $upstream_cache_status [$time_iso8601] "$request" '
                          '$status $body_bytes_sent ut=$upstream_response_time rt=$request_time '
                          '"$http_user_agent" host=$host';

# ═══════════════════════════════════════════════════════════════════
# NET SHIELD — Zapping Atómico + Prefetch Especulativo v1.0
# Objetivo: primer frame del nuevo canal en <500ms
# ═══════════════════════════════════════════════════════════════════

# ═══ Upstreams con keepalive (elimina TCP handshake en zapping) ═══
upstream x1megaott_upstream {
    server 149.18.45.78:80 max_fails=3 fail_timeout=10s;
    server 149.18.45.119:80 max_fails=3 fail_timeout=10s;
    server 149.18.45.189:80 max_fails=3 fail_timeout=10s;
    keepalive 8;
    keepalive_timeout 30s;
    keepalive_requests 1000;
    server 127.0.0.1:9182 backup;  # F L1 Vacuum Mode Brazil failover
}
upstream line_tivi_upstream {
    server 91.208.115.23:80 max_fails=3 fail_timeout=10s;
    keepalive 4;
    keepalive_timeout 30s;
    keepalive_requests 1000;
    server 127.0.0.1:9183 backup;  # F L1 Vacuum Mode Brazil failover
}
upstream ky_tv_upstream {
    server 172.110.220.61:80 max_fails=3 fail_timeout=10s;
    keepalive 4;
    keepalive_timeout 30s;
    keepalive_requests 1000;
    server 127.0.0.1:9184 backup;  # F L1 Vacuum Mode Brazil failover
}
upstream tivigo_upstream {
    server 154.6.41.6:80 max_fails=3 fail_timeout=10s;
    server 154.6.41.66:80 max_fails=3 fail_timeout=10s;
    server 154.6.41.126:80 max_fails=3 fail_timeout=10s;
    server 154.6.41.186:80 max_fails=3 fail_timeout=10s;
    keepalive 8;
    keepalive_timeout 30s;
    keepalive_requests 1000;
    server 127.0.0.1:9181 backup;  # F L1 Vacuum Mode Brazil failover
}

# ═══════════════════════════════════════════════════════════════════
# nfqdeuxu.x1megaott.online
# ═══════════════════════════════════════════════════════════════════
server {
    listen 80 fastopen=256;
    server_name nfqdeuxu.x1megaott.online;
    allow 181.63.176.21;
    allow 178.156.147.234;
    allow 10.200.0.0/24;
    allow 127.0.0.0/8;
    deny all;
    access_log /var/log/nginx/iptv_intercept.log iptv_intercept;

    # ═══ ZAPPING ATÓMICO: .m3u8 manifests ═══
    location ~* \.m3u8$ {
        proxy_pass http://x1megaott_upstream;
        access_by_lua_file /etc/nginx/lua/upstream_gate.lua;
        header_filter_by_lua_file /etc/nginx/lua/upstream_response.lua;
        body_filter_by_lua_file /etc/nginx/lua/combined_body_filter.lua;
        log_by_lua_file /etc/nginx/lua/bandwidth_reactor.lua;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host nfqdeuxu.x1megaott.online;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Referer $http_referer;
        proxy_cache iptv_cache;
        proxy_cache_valid 200 206 3s;
        proxy_cache_valid 302 301 0;
        proxy_cache_valid 403 401 0;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 2s;
        proxy_cache_use_stale error timeout updating http_403 http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 16 64k;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # ═══ Segmentos TS — throughput máximo ═══
    location ~* \.(ts|aac|m4s)$ {
        proxy_pass http://x1megaott_upstream;
        access_by_lua_file /etc/nginx/lua/upstream_gate.lua;
        header_filter_by_lua_file /etc/nginx/lua/upstream_response.lua;
        log_by_lua_file /etc/nginx/lua/bandwidth_reactor.lua;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host nfqdeuxu.x1megaott.online;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Referer $http_referer;
        proxy_cache iptv_cache;
        proxy_cache_valid 200 206 10m;
        proxy_cache_valid 403 401 0;
        proxy_cache_lock on;
        proxy_cache_use_stale error timeout;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 64 128k;
        proxy_busy_buffers_size 512k;
        proxy_connect_timeout 2s;
        proxy_read_timeout 60s;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    location / {
        proxy_pass http://x1megaott_upstream;
        access_by_lua_file /etc/nginx/lua/upstream_gate.lua;
        header_filter_by_lua_file /etc/nginx/lua/upstream_response.lua;
        log_by_lua_file /etc/nginx/lua/bandwidth_reactor.lua;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host nfqdeuxu.x1megaott.online;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Referer $http_referer;
        proxy_cache iptv_cache;
        proxy_cache_valid 200 5s;
        proxy_cache_valid 403 401 0;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
        add_header X-Cache-Status $upstream_cache_status always;
    }
}

