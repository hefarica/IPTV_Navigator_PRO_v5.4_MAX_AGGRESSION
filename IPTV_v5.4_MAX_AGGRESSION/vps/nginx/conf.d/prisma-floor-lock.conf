# APE PRISMA v2.0 — FLOOR-LOCK + SENTINEL NGINX Integration
# ═══════════════════════════════════════════════════════════════════════
# This conf is INCLUDED by the main shield config via:
#   include /etc/nginx/conf.d/prisma-floor-lock.conf;
# inside the http {} block (after iptv-lua-circuit.conf which defines circuit_metrics)
#
# NET SHIELD AUTOPISTA INVARIANTS PRESERVED:
#   ✅ A1: upstream_gate.lua PASSTHROUGH untouched
#   ✅ A2: upstream_response.lua PASSTHROUGH untouched
#   ✅ A3: limit_conn xtream_slot >= 2 untouched
#   ✅ A4: hard_cap rate >= 100r/s untouched
#   ✅ A5: proxy_next_upstream untouched
#   ✅ B1-B6: All buffer/timeout values untouched
#   ✅ C1-C5: All cache rules untouched
#   ✅ D1-D5: All kernel params untouched
#
# THIS FILE ONLY ADDS:
#   1. body_filter_by_lua_file for HLS master playlist filtering (FLOOR-LOCK)
#   2. header_filter_by_lua_file for auth failure tracking (SENTINEL)
#   3. Two new content_by_lua_file endpoints for telemetry APIs
#   4. A shared dict for LAB config caching
#
# DEPLOYMENT:
#   scp prisma-floor-lock.conf root@VPS:/etc/nginx/conf.d/
#   ssh root@VPS "nginx -t && systemctl reload nginx"

# ── Shared dict for LAB config caching (lab_config.lua uses this) ────
# Size: 1m = enough for ~6 JSON configs of ~2KB each, plus metadata
lua_shared_dict lab_config 1m;

# Reactor tick 1Hz (USER DOCTRINE 2026-05-11)
init_worker_by_lua_file /etc/nginx/lua/reactor_tick.lua;

# ── Lua package path for lab_config module ───────────────────────────
# This appends to the existing lua_package_path defined in nginx.conf
# lua_package_path is ADDITIVE — this won't clobber existing paths
# NOTE: If lua_package_path is already set in nginx.conf, this must be
# merged there instead. Comment this line if it conflicts.
# lua_package_path "/etc/nginx/lua/?.lua;;";

# ── FLOOR-LOCK + SENTINEL Activation ─────────────────────────────────
# These directives are AUTO-INJECTED into shield-location.conf by the
# deploy script: vps/deploy/prisma-v2-deploy.sh (Stages 4B + 4C).
# DO NOT add them manually — the deploy script handles idempotency,
# backup, and cache-bypass injection together.
#
# What gets injected:
#   1. body_filter_by_lua_file /etc/nginx/lua/floor_lock_filter.lua  (Stage 4C)
#      → into shield-location.conf, after header_filter_by_lua_file line
#   2. proxy_cache_bypass $arg_profile $http_x_ape_profile           (Stage 4C)
#      → into shield-location.conf, after proxy_no_cache $shield_no_cache
#   3. set $sentinel_ua "Mozilla/5.0 (Linux; Android 10; AFTKA)..."  (Stage 4C)
#      → into shield-location.conf, before proxy_set_header User-Agent
#   4. proxy_set_header User-Agent $sentinel_ua                       (Stage 4C)
#      → replaces hardcoded UA string
#
# header_filter and access_by_lua are NOT new directives. They're merged
# into the existing upstream_response.lua and upstream_gate.lua via
# pcall(dofile, ...) and require() respectively (NGINX singleton limit).

# ── SENTINEL Telemetry API Endpoint ──────────────────────────────────
server {
    listen 127.0.0.1:8099;
    server_name localhost;

    # Sentinel status API
    location = /prisma/api/sentinel-status {
        content_by_lua_file /etc/nginx/lua/sentinel_telemetry_api.lua;
    }

    # Bandwidth Reactor API (already existed, re-exposed here for completeness)
    location = /prisma/api/bandwidth-reactor {
        content_by_lua_file /etc/nginx/lua/bandwidth_reactor_api.lua;
    }

    # Full Telescope Telemetry API
    location = /prisma/api/telemetry-full {
        content_by_lua_file /etc/nginx/lua/prisma_telemetry_full.lua;
    }
}
