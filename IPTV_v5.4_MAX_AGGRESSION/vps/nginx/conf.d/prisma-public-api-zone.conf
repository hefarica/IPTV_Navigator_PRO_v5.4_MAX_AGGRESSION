# APE PRISMA v2.0 — Public API Rate Limit Zone
# ═══════════════════════════════════════════════════════════════════════
# CONTEXT: HTTP — auto-included by NGINX from /etc/nginx/conf.d/*.conf
#
# PURPOSE: Defines the rate-limit zone consumed by location blocks in
#          /etc/nginx/snippets/prisma-public-api-locations.conf
#
# WHY SEPARATE FROM LOCATIONS:
#   `limit_req_zone` is HTTP-context only. `location` is server-context only.
#   They MUST live in different files. Putting both in /etc/nginx/conf.d/
#   would fail `nginx -t` because location blocks are not valid at http level.
#
# AUTOPISTA SOP COMPLIANT:
#   ✅ No interference with shield rate limits (different zone name)
#   ✅ 10r/s is generous for 30s polling; only blocks abuse
# ═══════════════════════════════════════════════════════════════════════

limit_req_zone $binary_remote_addr zone=prisma_api:1m rate=10r/s;
