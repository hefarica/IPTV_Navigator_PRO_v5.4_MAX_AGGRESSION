location = /_shield_auth {
    internal;
    fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    fastcgi_param SCRIPT_FILENAME /var/www/html/api/shield-auth.php;
    fastcgi_param SCRIPT_NAME /api/shield-auth.php;
    fastcgi_param REQUEST_METHOD GET;
    fastcgi_param QUERY_STRING "";
    fastcgi_param CONTENT_TYPE "";
    fastcgi_param CONTENT_LENGTH "";
    fastcgi_param DOCUMENT_ROOT /var/www/html;
    fastcgi_param REQUEST_URI /api/shield-auth.php;
    fastcgi_param SERVER_PROTOCOL $server_protocol;
    fastcgi_param HTTP_X_ORIGINAL_URI $request_uri;
    fastcgi_param HTTP_X_ORIGINAL_HOST $host;
    fastcgi_param HTTP_X_REAL_IP $remote_addr;
    fastcgi_param HTTPS on;
}

location ~ ^/shield/([a-f0-9]+)/([^/]+)/(.*)$ {
    auth_request /_shield_auth;
    auth_request_set $shield_owner $upstream_http_x_shield_owner;

    # >>> NET SHIELD Fase 3.5 Phase 2: Lua Circuit Breaker <<<
    # PRE: gate de cooldown — si host en cooldown activo → 503 sin tocar upstream
    # TELESCOPE v2.1: Predictive header adjustment (rewrite phase, PASSTHROUGH)
    rewrite_by_lua_file /etc/nginx/lua/decision_engine.lua;
    access_by_lua_file /etc/nginx/lua/upstream_gate.lua;
    # POST: state machine — actualiza retry/cooldown según status del upstream
    header_filter_by_lua_file /etc/nginx/lua/upstream_response.lua;
    # >>> PRISMA v2.0: Floor-Lock HLS variant filter <<<
    log_by_lua_file /etc/nginx/lua/bandwidth_reactor.lua;
    # <<< End PRISMA Floor-Lock <<<
    # <<< End Phase 2 <<<

    # Slot protection: 2 concurrent per user/pass
    # FIX 2026-04-26: era 1 → causaba 429 cuando 2 manifest polls se solapaban
    #   (player pide cada 2-3s, upstream tarda 0.5s → overlap natural)
    #   Con 2, el solapamiento funciona igual que directo al proveedor.
    #   Abrir un 2do STREAM real necesitaría 3+ conns → aún protegido.
    limit_conn xtream_slot 2;
    limit_conn_status 429;
    # >>> NET SHIELD Hard cap (anti-DOS only, NO anti-bot — eso es Lua) <<<
    limit_req      zone=hard_cap   burst=200 nodelay;
    limit_req_status 429;
    # <<< End hard cap <<<

    # ═══════════════════════════════════════════════════════════════════════
    # VARIABLES — todas vía map en iptv-shield-rate.conf (http{} context)
    # MIGRADO 2026-04-26: eliminados set $shield_host $2 / set $shield_path /$3
    # para blindar contra clobbering de capturas numeradas en auth_request
    # subrequests. Las variables $shield_host, $shield_path y $shield_upstream
    # se resuelven por map $request_uri antes de llegar aquí.
    # ═══════════════════════════════════════════════════════════════════════

    # Guard: upstream no reconocido → 403
    if ($shield_upstream = "") { return 403; }

    proxy_pass http://$shield_upstream$shield_path$is_args$args;


    # ═══ Failover entre IPs dentro del mismo upstream block ═══
    # Plan Técnico §5 Fase 3: explícito aquí, no solo en global quantum.conf
    # NO incluir 403/429 (provider rechaza, no insistir)
    proxy_next_upstream         error timeout http_403 http_500 http_502 http_503 http_504;
    proxy_next_upstream_tries   3;
    proxy_next_upstream_timeout 5s;

    # Headers críticos: Host real del Xtream + UA real (anti-fingerprint) + Referer consistente
    proxy_pass_request_headers off;
    proxy_set_header Accept "*/*";
    proxy_set_header Host $shield_host;
    set $sentinel_ua "Mozilla/5.0 (Linux; Android 10; AFTKA) AppleWebKit/537.36 (KHTML, like Gecko) Silk/112.3.1 like Chrome/112.0.5615.213 Safari/537.36";
    proxy_set_header User-Agent $sentinel_ua;
    proxy_set_header Referer "https://www.netflix.com/";

    # Cache: clave basada en map variables (no raw $3, blindado contra clobber)
    proxy_cache iptv_cache;
    proxy_cache_key "$scheme$shield_host$shield_path";
    proxy_cache_valid 200 206 20s;
    proxy_cache_valid 302 301 0;
    proxy_cache_valid 403 401 0;
    proxy_cache_lock on;
    proxy_cache_lock_timeout 3s;
    proxy_cache_min_uses 1;
    proxy_cache_methods GET HEAD;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_background_update on;
    proxy_ignore_headers Cache-Control Expires Set-Cookie X-Accel-Expires;

    # No cache para signed token paths
    set $shield_no_cache 0;
    if ($request_uri ~* "/hlsr/") { set $shield_no_cache 1; }
    proxy_cache_bypass $shield_no_cache;
    proxy_no_cache $shield_no_cache;
    # PRISMA FLOOR-LOCK: Bypass cache when profile specified (prevents cross-profile poisoning)
    proxy_cache_bypass $arg_profile $http_x_ape_profile;
    proxy_no_cache $arg_profile $http_x_ape_profile;

    # ═══ AUTOPISTA MODE — Max throughput buffers (2026-04-26) ═══
    proxy_buffering on;
    proxy_buffer_size 128k;          # header buffer (era 32k)
    proxy_buffers 16 128k;           # 16×128k = 2MB total (era 32×32k = 1MB)
    proxy_busy_buffers_size 256k;    # enviar al player mientras sigue descargando
    output_buffers 4 128k;           # salida al cliente en bloques de 128k
    # Timeouts: rápido en connect, generoso en transferencia
    proxy_connect_timeout 3s;        # 2s era demasiado agresivo para SurfShark hops
    proxy_send_timeout 60s;          # era 30s — 4K segments pueden tardar
    proxy_read_timeout 60s;          # era 30s — margin para CDN lentos

    add_header X-Cache-Status $upstream_cache_status always;
    add_header X-Shield-Owner $shield_owner always;
    add_header X-Shield-Host $shield_host always;
    access_log /var/log/nginx/shield_access.log iptv_intercept;
    error_log /var/log/nginx/shield_error.log warn;
}

