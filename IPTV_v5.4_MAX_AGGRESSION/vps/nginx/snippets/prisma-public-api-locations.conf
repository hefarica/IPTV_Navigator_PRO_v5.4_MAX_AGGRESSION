# APE PRISMA v2.0 — Public API Location Blocks
# ═══════════════════════════════════════════════════════════════════════
# CONTEXT: SERVER — must be `include`d INSIDE the public HTTPS server block:
#
#   server {
#       listen 443 ssl http2;
#       server_name iptv-ape.duckdns.org;
#       ...existing locations...
#       include /etc/nginx/snippets/prisma-public-api-locations.conf;
#   }
#
# Companion: /etc/nginx/conf.d/prisma-public-api-zone.conf defines the
# limit_req_zone "prisma_api" used here (must be at HTTP context).
#
# PURPOSE: Expose internal Lua telemetry APIs (running on 127.0.0.1:8099)
#          to the public HTTPS endpoint so the frontend widget can reach them.
#
# AUTOPISTA SOP COMPLIANT:
#   ✅ Read-only APIs — no body mutation, no upstream traffic
#   ✅ No ngx.exit, no blocking, no interference with shield traffic
#   ✅ Rate limited 10r/s burst=5 (anti-abuse only, not restrictive)
#   ✅ CORS scoped to https://iptv-ape.duckdns.org
# ═══════════════════════════════════════════════════════════════════════

# ── Sentinel Status API ──────────────────────────────────────────────
location = /prisma/api/sentinel-status {
    limit_except GET { deny all; }
    limit_req zone=prisma_api burst=5 nodelay;

    add_header Access-Control-Allow-Origin "https://iptv-ape.duckdns.org" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, X-APE-Profile" always;

    if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin "https://iptv-ape.duckdns.org";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, X-APE-Profile";
        add_header Access-Control-Max-Age 3600;
        add_header Content-Length 0;
        return 204;
    }

    proxy_pass http://127.0.0.1:8099/prisma/api/sentinel-status;
    proxy_set_header Host localhost;
    proxy_connect_timeout 2s;
    proxy_read_timeout 5s;

    proxy_cache off;
    add_header Cache-Control "no-cache, no-store" always;
}

# ── Full Telescope Telemetry API ─────────────────────────────────────
# NOTE: /prisma/api/telemetry-full is ALREADY defined in sites-enabled/default
# (TELESCOPE v2.1 pre-existing endpoint with content_by_lua_file).
# Do NOT redefine here or nginx -t fails with "duplicate location".
# If you need to expose a different version of telemetry-full, modify the
# definition in sites-enabled/default instead.

# ── Bandwidth Reactor API ────────────────────────────────────────────
location = /prisma/api/bandwidth-reactor {
    limit_except GET { deny all; }
    limit_req zone=prisma_api burst=5 nodelay;

    add_header Access-Control-Allow-Origin "https://iptv-ape.duckdns.org" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, X-APE-Profile" always;

    if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin "https://iptv-ape.duckdns.org";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, X-APE-Profile";
        add_header Access-Control-Max-Age 3600;
        add_header Content-Length 0;
        return 204;
    }

    proxy_pass http://127.0.0.1:8099/prisma/api/bandwidth-reactor;
    proxy_set_header Host localhost;
    proxy_connect_timeout 2s;
    proxy_read_timeout 5s;
    proxy_cache off;
    add_header Cache-Control "no-cache, no-store" always;
}
