# ═══════════════════════════════════════════════════════════════════
# tivigo.cc
# ═══════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name tivigo.cc;
    allow 181.63.176.21;
    allow 178.156.147.234;
    allow 10.200.0.0/24;
    allow 127.0.0.1/8;
    deny all;
    access_log /var/log/nginx/iptv_intercept.log iptv_intercept;

    location ~* /hlsr/ {
        proxy_pass http://tivigo_upstream;
        access_by_lua_file /etc/nginx/lua/upstream_gate.lua;
        header_filter_by_lua_file /etc/nginx/lua/upstream_response.lua;
        log_by_lua_file /etc/nginx/lua/bandwidth_reactor.lua;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host tivigo.cc;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Referer $http_referer;
        proxy_cache off;
        proxy_buffering on;
        proxy_buffer_size 64k;
        proxy_buffers 32 64k;
        proxy_connect_timeout 2s;
        proxy_read_timeout 60s;
        add_header X-Cache-Status NOCACHE always;
    }

    location ~* \.m3u8$ {
        proxy_pass http://tivigo_upstream;
        access_by_lua_file /etc/nginx/lua/upstream_gate.lua;
        header_filter_by_lua_file /etc/nginx/lua/upstream_response.lua;
        log_by_lua_file /etc/nginx/lua/bandwidth_reactor.lua;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host tivigo.cc;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Referer $http_referer;
        proxy_cache iptv_cache;
        proxy_cache_valid 200 206 3s;
        proxy_cache_valid 302 301 0;
        proxy_cache_valid 403 401 0;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 2s;
        proxy_cache_use_stale error timeout updating http_403 http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_buffering on;
        proxy_buffer_size 64k;
        proxy_buffers 16 64k;
        proxy_connect_timeout 2s;
        proxy_read_timeout 10s;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    location ~* \.ts$ {
        slice 1m;
        proxy_cache_key $scheme$proxy_host$uri$slice_range;
        proxy_pass http://tivigo_upstream;
        access_by_lua_file /etc/nginx/lua/upstream_gate.lua;
        header_filter_by_lua_file /etc/nginx/lua/upstream_response.lua;
        log_by_lua_file /etc/nginx/lua/bandwidth_reactor.lua;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host tivigo.cc;
        proxy_set_header Range $slice_range;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Referer $http_referer;
        proxy_cache iptv_cache;
        proxy_cache_valid 200 206 10m;
        proxy_cache_valid 403 401 0;
        proxy_cache_lock on;
        proxy_cache_use_stale error timeout;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 128 64k;
        proxy_busy_buffers_size 512k;
        proxy_connect_timeout 2s;
        proxy_read_timeout 60s;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header X-Quantum-Slice 1m always;
    }

    location / {
        proxy_pass http://tivigo_upstream;
        access_by_lua_file /etc/nginx/lua/upstream_gate.lua;
        header_filter_by_lua_file /etc/nginx/lua/upstream_response.lua;
        log_by_lua_file /etc/nginx/lua/bandwidth_reactor.lua;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host tivigo.cc;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Referer $http_referer;
        proxy_cache iptv_cache;
        proxy_cache_valid 200 206 30s;
        proxy_cache_valid 302 301 0;
        proxy_cache_lock on;
        proxy_buffering on;
        proxy_connect_timeout 2s;
        proxy_read_timeout 60s;
        add_header X-Cache-Status $upstream_cache_status always;
    }
}
