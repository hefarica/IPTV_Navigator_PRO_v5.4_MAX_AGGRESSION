# ═══════════════════════════════════════════════════════════════════
# NET SHIELD — Zapping Atómico (aplica a TODOS los intercepts)
# Objetivo: primer frame del nuevo canal en <1 segundo
# ═══════════════════════════════════════════════════════════════════

# Resolver local — elimina latencia DNS en proxy_pass
resolver 127.0.0.1 valid=60s ipv6=off;
resolver_timeout 1s;

# ═══ Upstreams con keepalive para zapping rápido ═══
# Reutiliza conexiones TCP al upstream (evita 3-way handshake por canal)

upstream x1megaott_upstream {
    server 149.18.45.78:80 max_fails=0;
    server 149.18.45.119:80 max_fails=0;
    server 149.18.45.189:80 max_fails=0;
    keepalive 8;
    keepalive_timeout 30s;
    keepalive_requests 1000;
}
upstream line_tivi_upstream {
    server 91.208.115.23:80 max_fails=0;
    keepalive 4;
    keepalive_timeout 30s;
    keepalive_requests 1000;
}
upstream ky_tv_upstream {
    server 172.110.220.61:80 max_fails=0;
    keepalive 4;
    keepalive_timeout 30s;
    keepalive_requests 1000;
}
upstream tivigo_upstream {
    server 154.6.41.6:80 max_fails=0;
    server 154.6.41.66:80 max_fails=0;
    server 154.6.41.126:80 max_fails=0;
    server 154.6.41.186:80 max_fails=0;
    keepalive 8;
    keepalive_timeout 30s;
    keepalive_requests 1000;
}

# ═══════════════════════════════════════════════════════════════════
# nfqdeuxu.x1megaott.online
# ═══════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name nfqdeuxu.x1megaott.online;
    allow 181.63.176.21;
    allow 178.156.147.234;
    allow 10.200.0.0/24;
    allow 127.0.0.1/8;
    deny all;
    access_log /var/log/nginx/iptv_intercept.log iptv_intercept;

    # ═══ ZAPPING ATÓMICO: .m3u8 manifests ═══
    location ~* \.m3u8$ {
        proxy_pass http://x1megaott_upstream;
        access_by_lua_file /etc/nginx/lua/upstream_gate.lua;
        header_filter_by_lua_file /etc/nginx/lua/upstream_response.lua;
        log_by_lua_file /etc/nginx/lua/bandwidth_reactor.lua;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host nfqdeuxu.x1megaott.online;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Referer $http_referer;

        # Cache agresivo para zapping — HIT = 0ms
        proxy_cache iptv_cache;
        proxy_cache_valid 200 206 3s;
        proxy_cache_valid 302 301 0;
        proxy_cache_valid 403 401 0;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 2s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;

        # Timeouts atómicos
        proxy_connect_timeout 2s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;

        # Buffers rápidos
        proxy_buffering on;
        proxy_buffer_size 64k;
        proxy_buffers 16 64k;

        add_header X-Cache-Status $upstream_cache_status always;
    }

    # ═══ Segmentos TS — throughput máximo ═══
    location ~* \.(ts|aac|m4s)$ {
        proxy_pass http://x1megaott_upstream;
        access_by_lua_file /etc/nginx/lua/upstream_gate.lua;
        header_filter_by_lua_file /etc/nginx/lua/upstream_response.lua;
        log_by_lua_file /etc/nginx/lua/bandwidth_reactor.lua;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host nfqdeuxu.x1megaott.online;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Referer $http_referer;
        proxy_cache iptv_cache;
        proxy_cache_valid 200 206 10m;
        proxy_cache_valid 403 401 0;
        proxy_cache_lock on;
        proxy_cache_use_stale error timeout;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 64 128k;
        proxy_busy_buffers_size 512k;
        proxy_connect_timeout 2s;
        proxy_read_timeout 60s;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    location / {
        proxy_pass http://x1megaott_upstream;
        access_by_lua_file /etc/nginx/lua/upstream_gate.lua;
        header_filter_by_lua_file /etc/nginx/lua/upstream_response.lua;
        log_by_lua_file /etc/nginx/lua/bandwidth_reactor.lua;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host nfqdeuxu.x1megaott.online;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Referer $http_referer;
        proxy_cache iptv_cache;
        proxy_cache_valid 200 5s;
        proxy_cache_valid 403 401 0;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
        add_header X-Cache-Status $upstream_cache_status always;
    }
}

