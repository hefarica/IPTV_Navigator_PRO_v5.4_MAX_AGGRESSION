server {
    listen 80;
    listen [::]:80;
    server_name iptv-ape.duckdns.org 178.156.147.234;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name iptv-ape.duckdns.org 178.156.147.234;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/iptv-ape.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iptv-ape.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # VPS SOLO TEXTO: root donde viven las playlists y scripts PHP
    root /var/www/html;
    include /etc/nginx/snippets/api-rewrite.conf;
    index index.php index.html;

    # Logs dedicados
    access_log /var/log/nginx/playlist_access.log;
    error_log /var/log/nginx/playlist_error.log warn;

    server_tokens off;

    # Performance para texto grande
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Timeouts defensivos para uploads grandes
    client_max_body_size 600M;
    client_body_timeout 120s;
    send_timeout 180s;
    keepalive_timeout 30s;

    # Healthcheck
    location = /health {
        add_header Content-Type text/plain;
        return 200 "OK\n";
    }

    # ==============================
    #  PHP UPLOAD SCRIPTS (CHUNKED)
    # ==============================
    location ~ \.php$ {
        # PHP sends its own CORS — only handle preflight OPTIONS here
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Upload-Id, X-Chunk-Index, X-Total-Chunks, X-Chunk-SHA256, X-Chunk-MD5, X-Secret-Key, Range, Origin, x-playback-session-id, x-ape-signature, ape-security-token, x-request-profile" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Type text/plain;
            add_header Content-Length 0;
            return 204;
        }

        # PHP-FPM
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
    }

    # ==============================
    #  PLAYLIST M3U8 (GZIP STATIC STREAMING)
    #  500MB+ listas servidas desde .gz pre-comprimido
    #  gunzip descomprime en streaming (16KB chunks, ZERO RAM spike)
    # ==============================
    location ~* \.m3u8$ {
        # MIME correcto
        default_type application/vnd.apple.mpegurl;
        types { application/vnd.apple.mpegurl m3u8; }

        # ═══ GZIP STATIC: Sirve el .gz pre-comprimido directo del disco ═══
        # "always" = sirve .gz incluso si el cliente NO envía Accept-Encoding: gzip
        # En ese caso, gunzip descomprime al vuelo.
        gzip_static always;

        # ═══ GUNZIP: Streaming decompression para clientes legacy ═══
        # Lee el .gz en chunks de 16KB, descomprime y envía sin buffear todo en RAM.
        # Compatible con: OTT Navigator, TiviMate, IPTV Smarters, VLC, Kodi,
        # Perfect Player, GSE, Smart IPTV, y cualquier HTTP client.
        gunzip on;
        
        # Vary para que proxies/CDN cachen ambas versiones
        gzip_vary on;

        # ═══ STREAMING BUFFERS: Controlan el flujo de descompresión ═══
        # 32 buffers de 16KB = 512KB pipeline en memoria (NADA vs 500MB)
        # Nginx lee 16KB del .gz → descomprime → envía al cliente → siguiente chunk
        output_buffers 32 16k;

        # ═══ SENDFILE para el path comprimido (zero-copy kernel) ═══
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;

        # CORS completo
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, DNT, User-Agent, X-Requested-With, If-Modified-Since, Cache-Control, Content-Type, Accept-Encoding" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, ETag, Last-Modified, Content-Encoding" always;

        # Preflight (sin redirects; 200 directo)
        if ($request_method = OPTIONS) {
            add_header Content-Type text/plain;
            add_header Content-Length 0;
            return 200;
        }

        # Range requests
        add_header Accept-Ranges bytes always;

        # Cache control — 5 min para que los players re-descarguen periódicamente
        add_header Cache-Control "public, max-age=300" always;
        expires 5m;

        # NO REDIRECTS EN PLAYLIST
        limit_except GET HEAD {
            deny all;
        }

        # try_files busca PRIMERO el .gz (gzip_static lo maneja)
        # Si no existe .gz, busca el .m3u8 sin comprimir
        try_files $uri =404;
    }

    # ==============================
    #  STATIC FILES (icons, etc)
    # ==============================
    location / {
        # CORS for other requests
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, x-playback-session-id, x-ape-signature, ape-security-token, x-request-profile" always;
            add_header Content-Type text/plain;
            add_header Content-Length 0;
            return 204;
        }
        
        try_files $uri $uri/ =404;
    }

    # ==============================
    #  BLOQUEO: NO VIDEO EN VPS
    # ==============================
    location ~* \.(ts|m4s|mp4)$ {
        return 404;
    }

    # Bloquear archivos sensibles
    location ~* \.(ini|log|sql|bak|env)$ {
        return 404;
    }

    # === APE v3.0 Resolver Security ===\n    location ~ ^/iptv-ape/(logs|cache|modules|profiles|telemetry|mutations)/ {\n        deny all;\n        return 403;\n    }\n
    location ~ /\.ht {
        deny all;
    }
}
