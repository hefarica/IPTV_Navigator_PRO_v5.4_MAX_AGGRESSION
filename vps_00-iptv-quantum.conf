# ═══════════════════════════════════════════════════════════════════════════
# NET SHIELD QUANTUM — nginx http{} tuning global (2026-04-22)
# Carga ANTES que iptv-intercept.conf por el prefijo 00- en el sort de *.conf
# Propósito: baseline común para todos los vhosts IPTV.
#   - aio threads: I/O asíncrono en pool de threads kernel
#   - proxy buffers grandes para HLS sin touchear disco
#   - proxy_cache_use_stale agresivo (imperceptible el corte)
#   - proxy_cache_revalidate on (If-Modified-Since al origin)
#   - proxy_ignore_headers: desactiva Cache-Control del origin para respetar
#     nuestras políticas locales
# ═══════════════════════════════════════════════════════════════════════════

# aio threads: requiere worker_processes auto (ya está) + kernel con io_uring/aio
aio threads;
aio_write on;

# Max temp file 0: NO spillea cache miss a /tmp, lo sirve directo al cliente

# Revalidación condicional con origin
proxy_cache_revalidate on;

# Stale policy agresiva — sirve stale cuando origin falla O está actualizando
# Esto ES lo que hace el corte "imperceptible": si origin tarda, servimos el
# segmento viejo mientras refrescamos en background
proxy_cache_use_stale
    error
    timeout
    invalid_header
    updating
    http_500 http_502 http_503 http_504;

# Background update: el cliente recibe stale instantáneo, el refresh ocurre aparte
proxy_cache_background_update on;

# Lock: si 50 clientes piden el mismo .ts a la vez, solo uno va al origin
proxy_cache_lock on;
proxy_cache_lock_timeout 5s;
proxy_cache_lock_age 10s;

# Ignorar headers que el origin usa para NO cachear — nosotros decidimos
proxy_ignore_headers Cache-Control Expires Set-Cookie X-Accel-Expires Vary;

# Para conexiones vivas al origin, reutilizar sockets con HTTP/1.1 keep-alive
proxy_http_version 1.1;

# Connect rápido fail
proxy_connect_timeout 3s;

# Permitir que stale se sirva mientras origin está totalmente caído
proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
proxy_next_upstream_tries 3;
proxy_next_upstream_timeout 5s;
