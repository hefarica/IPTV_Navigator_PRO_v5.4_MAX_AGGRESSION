# ═══════════════════════════════════════════════════════════════════
# NET SHIELD AUTOPISTA — Module: TRAP (IP Traffic Interceptor)
# ═══════════════════════════════════════════════════════════════════
# Problem: URLs with hardcoded IPs (no domain) bypass DNS hijack
#          and NGINX, going raw: wg0 → MARK → wg-surfshark.
#          Result: zero cache, zero stale, zero BBR app-level.
#
# Fix:     iptables DNAT redirects IP-based IPTV traffic from wg0
#          to 127.0.0.1:80 → NGINX catches it here → proxy_pass
#          to original IP → exits via wg-surfshark (OUTPUT MARK).
#
# Flow:    Fire TV → wg0 → DNAT(127.0.0.1) → NGINX TRAP → proxy_pass
#          → OUTPUT SURFSHARK_MARK → table 100 → wg-surfshark → Provider
#
# Paired with iptables rules:
#   iptables -t nat -A PREROUTING -i wg0 -d <IPTV_RANGE> -p tcp --dport 80 \
#            -j DNAT --to-destination 127.0.0.1:80
# ═══════════════════════════════════════════════════════════════════

server {
    listen 80;

    # Match any request where Host header is a raw IPv4 address
    server_name ~^(\d{1,3}\.){3}\d{1,3}$;

    # Security: only from WireGuard clients + localhost
    allow 10.200.0.0/24;
    allow 127.0.0.1/8;
    allow 181.63.176.21;
    deny all;

    access_log /var/log/nginx/iptv_intercept.log iptv_intercept;
    error_log  /var/log/nginx/shield_error.log warn;

    # Resolver for variable proxy_pass (formality for IP hosts)
    resolver 8.8.8.8 valid=300s ipv6=off;

    # ── Manifests .m3u8 — cache + stale (critical for rebuffer prevention) ──
    location ~* \.m3u8$ {
        proxy_pass http://$host;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header User-Agent "Mozilla/5.0 (Linux; Android 10; AFTKA) AppleWebKit/537.36 Silk/112.3.1";
        proxy_set_header Referer "https://www.netflix.com/";

        proxy_cache iptv_cache;
        proxy_cache_valid 200 206 5s;
        proxy_cache_valid 302 301 0;
        proxy_cache_valid 403 401 0;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 3s;
        proxy_cache_use_stale error timeout updating http_403 http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;

        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;

        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 16 128k;
        proxy_busy_buffers_size 256k;
        proxy_connect_timeout 3s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        add_header X-Cache-Status $upstream_cache_status always;
        add_header X-Autopista-Module "TRAP" always;
    }

    # ── Segments .ts — cache longer, slice for large segments ──
    location ~* \.ts$ {
        slice 1m;
        proxy_cache_key $scheme$proxy_host$uri$slice_range;

        proxy_pass http://$host;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header Range $slice_range;
        proxy_set_header User-Agent "Mozilla/5.0 (Linux; Android 10; AFTKA) AppleWebKit/537.36 Silk/112.3.1";
        proxy_set_header Referer "https://www.netflix.com/";

        proxy_cache iptv_cache;
        proxy_cache_valid 200 206 10m;
        proxy_cache_valid 403 401 0;
        proxy_cache_lock on;
        proxy_cache_use_stale error timeout;

        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 128 64k;
        proxy_busy_buffers_size 256k;
        proxy_connect_timeout 3s;
        proxy_read_timeout 60s;

        add_header X-Cache-Status $upstream_cache_status always;
        add_header X-Autopista-Module "TRAP" always;
        add_header X-Quantum-Slice 1m always;
    }

    # ── Default (API calls, play endpoints, etc.) ──
    location / {
        proxy_pass http://$host;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header User-Agent "Mozilla/5.0 (Linux; Android 10; AFTKA) AppleWebKit/537.36 Silk/112.3.1";
        proxy_set_header Referer "https://www.netflix.com/";

        proxy_cache iptv_cache;
        proxy_cache_valid 200 206 20s;
        proxy_cache_valid 302 301 0;
        proxy_cache_valid 403 401 0;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504 http_403;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 3s;

        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 16 128k;
        proxy_busy_buffers_size 256k;
        proxy_connect_timeout 3s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        proxy_next_upstream error timeout http_502 http_503 http_504;

        add_header X-Cache-Status $upstream_cache_status always;
        add_header X-Autopista-Module "TRAP" always;
    }
}
