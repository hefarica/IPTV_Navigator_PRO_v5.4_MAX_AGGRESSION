# ===== rynivorn.cc CDN (redirect target de tivigo.cc) — añadido 2026-04-25 =====
# Provider tivigo.cc emite 302 con Location apuntando a {N}.rynivorn.cc
# Sin esta intercepción, el cliente del ONN sigue el 302 fuera del shield
# y queda sin SurfShark + sin xtream_slot + sin cache → canal no entra.
#
# Patrón idéntico a tivigo.cc (mismas locations + cache policy).
# Diferencias mínimas:
#   - server_name wildcard (subdominios dinámicos: 6840785, 1, 100, ...)
#   - proxy_set_header Host $host (subdomain dinámico, NO hardcoded)

upstream rynivorn_upstream {
    server 154.6.152.11:80 max_fails=0;
    # keepalive removed (RST on stale conn)
}

server {
    listen 80;
    server_name *.rynivorn.cc rynivorn.cc;
    allow 181.63.176.21;
    allow 178.156.147.234;
    allow 10.200.0.0/24;
    allow 127.0.0.1/8;
    deny all;
    access_log /var/log/nginx/iptv_intercept.log iptv_intercept;

    # Paths con signed tokens /hlsr/ — NO CACHE (tokens expiran rápido)
    location ~* /hlsr/ {
        proxy_pass http://rynivorn_upstream;

        # ═══ MODULE 6: REACTOR — Lua Pipeline ═══
        rewrite_by_lua_file /etc/nginx/lua/decision_engine.lua;
        access_by_lua_file /etc/nginx/lua/upstream_gate.lua;
        header_filter_by_lua_file /etc/nginx/lua/upstream_response.lua;
        log_by_lua_file /etc/nginx/lua/bandwidth_reactor.lua;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Referer $http_referer;
        proxy_cache off;
        proxy_buffering on;
        proxy_buffer_size 32k;
        proxy_buffers 32 32k;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        add_header X-Cache-Status NOCACHE always;
    }

    # Manifests m3u8 — cache 5s para coalescing entre clientes
    # FIX 2026-04-26: CDN rynivorn retorna 403 cuando tokens rotan.
    #   proxy_cache_use_stale con http_403 sirve manifest stale al player.
    location ~* \.m3u8$ {
        proxy_pass http://rynivorn_upstream;

        # ═══ MODULE 6: REACTOR — Lua Pipeline ═══
        rewrite_by_lua_file /etc/nginx/lua/decision_engine.lua;
        access_by_lua_file /etc/nginx/lua/upstream_gate.lua;
        header_filter_by_lua_file /etc/nginx/lua/upstream_response.lua;
        log_by_lua_file /etc/nginx/lua/bandwidth_reactor.lua;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Referer $http_referer;
        proxy_cache iptv_cache;
        proxy_cache_valid 200 206 5s;
        proxy_cache_valid 302 301 0;
        proxy_cache_valid 403 401 0;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 3s;
        # FIX: http_403 added — CDN rechaza tokens rotados, servir stale
        proxy_cache_use_stale error timeout updating http_403 http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_buffering on;
        proxy_buffer_size 32k;
        proxy_buffers 32 32k;
        proxy_connect_timeout 3s;
        proxy_read_timeout 60s;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # Segments .ts — cache slice 1m, hold tiempo largo
    location ~* \.ts$ {
        slice 1m;
        proxy_cache_key $scheme$proxy_host$uri$slice_range;
        proxy_pass http://rynivorn_upstream;

        # ═══ MODULE 6: REACTOR — Lua Pipeline ═══
        rewrite_by_lua_file /etc/nginx/lua/decision_engine.lua;
        access_by_lua_file /etc/nginx/lua/upstream_gate.lua;
        header_filter_by_lua_file /etc/nginx/lua/upstream_response.lua;
        log_by_lua_file /etc/nginx/lua/bandwidth_reactor.lua;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header Range $slice_range;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Referer $http_referer;
        proxy_cache iptv_cache;
        proxy_cache_valid 200 206 10m;
        proxy_cache_valid 403 401 0;
        proxy_cache_lock on;
        proxy_cache_use_stale error timeout updating http_403 http_500 http_502 http_503 http_504;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 128 64k;
        proxy_busy_buffers_size 256k;
        proxy_connect_timeout 3s;
        proxy_read_timeout 60s;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header X-Quantum-Slice 1m always;
    }

    # Default (player_api.php, get_short_epg, etc.)
    location / {
        proxy_pass http://rynivorn_upstream;

        # ═══ MODULE 6: REACTOR — Lua Pipeline ═══
        rewrite_by_lua_file /etc/nginx/lua/decision_engine.lua;
        access_by_lua_file /etc/nginx/lua/upstream_gate.lua;
        header_filter_by_lua_file /etc/nginx/lua/upstream_response.lua;
        log_by_lua_file /etc/nginx/lua/bandwidth_reactor.lua;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Referer $http_referer;
        proxy_cache iptv_cache;
        proxy_cache_valid 200 206 30s;
        proxy_cache_valid 302 301 0;
        proxy_cache_lock on;
        proxy_buffering on;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        add_header X-Cache-Status $upstream_cache_status always;
    }
}
